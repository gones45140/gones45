<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gones Bankroll</title>

    <!-- Scripts externes pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    STAGE 2 : DESIGN (CSS) - OPTIMISATION MOBILE & DARK MODE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 
-->
<style>
    :root {
        --bg-dark: #0f172a;
        --panel-bg: rgba(30, 41, 59, 0.7);
        --accent-cyan: #22d3ee;
        --ol-blue: #1e40af;
        --ol-red: #da0812;
        --win-green: #22c55e;
        --text-main: #f8fafc;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-dark);
        color: var(--text-main);
        padding-bottom: 80px; /* Espace pour la nav mobile */
    }

    /* --- CONTENEURS ET GRILLES --- */
    .container { padding: 15px; max-width: 800px; margin: auto; }

    .glass-panel {
        background: var(--panel-bg);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
    }

    .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
    }

    /* --- ÉLÉMENTS DE FORMULAIRE --- */
    input, select, textarea {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: white;
        font-size: 16px; /* Évite le zoom auto sur iPhone */
    }

    .btn-main {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: none;
        font-weight: bold;
        background: var(--ol-blue);
        color: white;
        cursor: pointer;
        text-transform: uppercase;
    }

    .btn-win { background: #166534; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; }
    .btn-loss { background: #991b1b; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; }
    .btn-mini { background: #334155; color: #cbd5e1; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; }
    .btn-mini-red { background: #7f1d1d; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; }

    /* --- TABLES ET LISTES --- */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; font-size: 12px; color: #94a3b8; padding: 8px 5px; text-transform: uppercase; }
    td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

    /* --- NAVIGATION BASSE --- */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1e293b;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
        border-top: 1px solid #334155;
        z-index: 100;
    }

    .nav-item {
        color: #94a3b8;
        text-decoration: none;
        font-size: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: none;
        border: none;
    }

    .nav-item.active { color: var(--accent-cyan); }
    .nav-item i { font-size: 20px; margin-bottom: 4px; }

    /* --- MODALE --- */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 200;
        padding: 20px;
    }

    /* --- COMPOSANTS SPÉCIFIQUES --- */
    .mini-stat {
        background: rgba(0,0,0,0.3);
        padding: 5px;
        border-radius: 4px;
        font-size: 11px;
        text-align: center;
    }

    .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .bet-mode-switch {
        display: flex;
        gap: 5px;
        margin-bottom: 15px;
    }

    .bet-mode-btn {
        flex: 1;
        padding: 10px;
        background: #334155;
        border: none;
        color: white;
        border-radius: 6px;
        font-size: 12px;
    }

    .bet-mode-btn.active { background: var(--accent-cyan); color: var(--bg-dark); font-weight: bold; }
</style>
</head>
    <body>
        <!-- 
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    STAGE 1 : STRUCTURE (HTML)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 
-->
<div class="container">
    <!-- HEADER & CAPITAL -->
    <div class="header-bar">
        <div>
            <h1 style="margin:0; font-size: 24px; color: var(--accent-cyan);">GONES BANKROLL</h1>
            <small id="d-ben" style="font-weight: bold;"></small>
        </div>
        <div style="text-align: right;">
            <div id="d-cap" style="font-size: 22px; font-weight: bold;">0.00€</div>
            <small style="opacity: 0.6;">CAPITAL TOTAL</small>
        </div>
    </div>

    <!-- ONGLETS PRINCIPAUX -->
    <div id="tab-dashboard" class="tab-content">
        <!-- STATS RAPIDES -->
        <div class="stat-grid">
            <div class="glass-panel">
                <label style="font-size: 10px; opacity: 0.7;">PROFIT BOOSTS</label>
                <div id="stat-boost-profit" style="color: var(--accent-cyan); font-weight: bold;">0.00€</div>
            </div>
            <div class="glass-panel">
                <label style="font-size: 10px; opacity: 0.7;">WINRATE BOOSTS</label>
                <div id="stat-boost-rate" style="font-weight: bold;">0%</div>
            </div>
        </div>

        <!-- FORMULAIRE DE PARI -->
        <div class="glass-panel">
            <div class="bet-mode-switch">
                <button class="bet-mode-btn active" id="btn-mode-strat" onclick="switchBetMode('strat'); this.classList.add('active'); document.getElementById('btn-mode-simple').classList.remove('active')">STRATÉGIE</button>
                <button class="bet-mode-btn" id="btn-mode-simple" onclick="switchBetMode('simple'); this.classList.add('active'); document.getElementById('btn-mode-strat').classList.remove('active')">SIMPLE / BOOST</button>
            </div>

            <!-- MODE STRATÉGIE -->
            <div id="sub-strat">
                <select id="c-unit" onchange="updMise()"></select>
                <input type="text" id="c-target" placeholder="Match (ex: Boca vs Palmeiras)">
                <input type="text" id="c-type" placeholder="Type (ex: Qualification)">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="c-cote" step="0.01" placeholder="Cote (ex: 1.55)">
                    <input type="number" id="c-mise" placeholder="Mise (€)">
                </div>
                <select id="c-book"></select>
                <button class="btn-main" onclick="pari(true)" style="margin-top: 10px;">VALIDER STRAT</button>
            </div>

            <!-- MODE SIMPLE -->
            <div id="sub-simple" style="display:none;">
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="p-sport" placeholder="Sport" style="flex:1">
                    <input type="text" id="n-comp" placeholder="Compétition" style="flex:2">
                </div>
                <input type="text" id="n-type" placeholder="Type (ex: Score Exact ou Boost)">
                <textarea id="n-analysis" placeholder="Notes ou Analyse rapide..." rows="2"></textarea>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="n-cote" step="0.01" placeholder="Cote">
                    <input type="number" id="n-mise" placeholder="Mise (€)">
                </div>
                <select id="n-book"></select>
                <button class="btn-main" onclick="pari(false)" style="margin-top: 10px; background: var(--accent-cyan); color: var(--bg-dark);">VALIDER SIMPLE</button>
            </div>
        </div>

        <!-- PARIS EN COURS -->
        <h3 style="font-size: 14px; color: var(--accent-cyan); text-transform: uppercase;">🔥 Paris en cours</h3>
        <div class="glass-panel" style="padding: 0;">
            <table>
                <thead><tr><th>Détails</th><th>Mise</th><th style="text-align:right">Action</th></tr></thead>
                <tbody id="h-live-strat"></tbody>
                <tbody id="h-live-norm"></tbody>
            </table>
        </div>
    </div>

    <!-- PAGE ÉQUIPES (GÉRÉ PAR JS) -->
    <div id="tab-equipes" class="tab-content" style="display:none;">
        <div id="page-bilan-equipes"></div>
    </div>

    <!-- PAGE ARCHIVES -->
    <div id="tab-archives" class="tab-content" style="display:none;">
        <div class="glass-panel" style="padding:0;">
            <table style="font-size: 12px;">
                <thead><tr><th>Date</th><th>Pari</th><th>Mise</th><th>Rés.</th><th style="text-align:right">Gain</th></tr></thead>
                <tbody id="arch-finished-list"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="exportData()" style="background:#334155; margin-top:15px;">EXPORTER LES DONNÉES (JSON)</button>
    </div>

    <!-- PAGE PARAMÈTRES (BANQUES & UNITÉS) -->
    <div id="tab-settings" class="tab-content" style="display:none;">
        <div class="glass-panel">
            <h3>🏦 Gestion des Bookmakers</h3>
            <div id="books-grid"></div>
            <div style="display:flex; gap:5px; margin-top:15px;">
                <input type="text" id="new-bk-name" placeholder="Nom du bookmaker">
                <button onclick="addBook()" class="btn-main" style="width:auto;">+</button>
            </div>
        </div>

        <div class="glass-panel">
            <h3>📏 Mes Unités (Teams)</h3>
            <table id="u-mgr-list"></table>
            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px;">
                <input type="text" id="u-n-add" placeholder="Nom de l'unité (ex: OL)">
                <select id="u-s-add">
                    <option value="1">Strat 1 (Défensive)</option>
                    <option value="2">Strat 2 (Standard)</option>
                    <option value="3">Strat 3 (Agressive)</option>
                    <option value="4">Strat 4 (High Stake)</option>
                    <option value="5">Strat 5 (Whale)</option>
                </select>
                <button class="btn-main" onclick="addUnit()">AJOUTER L'ÉQUIPE</button>
            </div>
        </div>
    </div>
</div>

<!-- NAVIGATION BASSE -->
<div class="bottom-nav">
    <button class="nav-item active" onclick="showTab('tab-dashboard', this)"><i>🏠</i>Dashboard</button>
    <button class="nav-item" onclick="showTab('tab-equipes', this)"><i>📊</i>Équipes</button>
    <button class="nav-item" onclick="showTab('tab-archives', this)"><i>📜</i>Archives</button>
    <button class="nav-item" onclick="showTab('tab-settings', this)"><i>⚙️</i>Admin</button>
</div>

<!-- MODALE DÉTAILS ÉQUIPE -->
<div id="modal-details" class="modal">
    <div class="glass-panel" id="modal-content" style="max-width: 500px; margin: 20% auto;"></div>
</div>
        <!-- 
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    STAGE 3 : LOGIQUE (JAVASCRIPT) - VERSION OPTIMISÉE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 
-->
<script>
// --- CONFIGURATION DES STRATÉGIES ---
const STRATS = {
    1: [10, 15, 25, 40, 65], // Défensive
    2: [20, 35, 60, 100, 170], // Standard
    3: [50, 90, 160, 280, 480], // Agressive
    4: [100, 180, 320, 560, 950], // High Stake
    5: [200, 360, 640, 1100, 1900] // Whale
};

// --- ÉTAT INITIAL ---
let state = JSON.parse(localStorage.getItem('gones_data')) || {
    b: [{ n: 'Winamax', v: 15000 }], // Capital initial exemple
    u: [], // Tes unités (OL, PSG, etc.)
    h: [], // Historique des paris finis
    l: []  // Paris en cours
};

const start_bk = 15000; // Ton dépôt total pour le calcul du profit

// --- FONCTIONS DE SAUVEGARDE ET D'AFFICHAGE ---
function save() {
    localStorage.setItem('gones_data', JSON.stringify(state));
    render();
}

function render() {
    renderDashboard();
    renderEquipes();
    renderArchives();
    renderSettings();
}

function renderDashboard() {
    // Calcul du capital total
    const total = state.b.reduce((acc, curr) => acc + curr.v, 0);
    const profit = total - start_bk;
    
    document.getElementById('d-cap').innerText = total.toFixed(2) + "€";
    const benEl = document.getElementById('d-ben');
    benEl.innerText = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "€";
    benEl.style.color = profit >= 0 ? "var(--win-green)" : "var(--ol-red)";

    // Liste des unités dans le menu déroulant
    const sel = document.getElementById('c-unit');
    sel.innerHTML = state.u.map(unit => `<option value="${unit.n}">${unit.n} (P${unit.p})</option>`).join('');
    
    // Liste des bookmakers
    const bSel = document.getElementById('c-book');
    const nBSel = document.getElementById('n-book');
    const booksHtml = state.b.map(b => `<option value="${b.n}">${b.n} (${b.v.toFixed(2)}€)</option>`).join('');
    bSel.innerHTML = booksHtml;
    nBSel.innerHTML = booksHtml;

    renderLiveBets();
    updMise();
}

function renderEquipes() {
    const container = document.getElementById('page-bilan-equipes');
    if (!container) return;
    container.innerHTML = state.u.map(unit => `
        <div class="glass-panel">
            <div style="display:flex; justify-content:space-between;">
                <h3 style="margin:0; color:var(--accent-cyan);">${unit.n}</h3>
                <span class="btn-mini">Strat ${unit.s}</span>
            </div>
            <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="mini-stat">Palier actuel: <b>P${unit.p}</b></div>
                <div class="mini-stat">Profit: <b style="color:${unit.pr >= 0 ? 'var(--win-green)' : 'var(--ol-red)'}">${unit.pr.toFixed(2)}€</b></div>
            </div>
        </div>
    `).join('');
}

// --- LOGIQUE DES PARIS ---
function updMise() {
    const name = document.getElementById('c-unit').value;
    const unit = state.u.find(u => u.n === name);
    if (unit) {
        document.getElementById('c-mise').value = STRATS[unit.s][unit.p - 1];
    }
}

function pari(isStrat) {
    const bookName = isStrat ? document.getElementById('c-book').value : document.getElementById('n-book').value;
    const mise = parseFloat(isStrat ? document.getElementById('c-mise').value : document.getElementById('n-mise').value);
    const book = state.b.find(b => b.n === bookName);

    if (book.v < mise) return alert("Fonds insuffisants sur " + bookName);

    const newBet = {
        id: Date.now(),
        isStrat: isStrat,
        unit: isStrat ? document.getElementById('c-unit').value : "Simple",
        target: isStrat ? document.getElementById('c-target').value : document.getElementById('p-sport').value,
        type: isStrat ? document.getElementById('c-type').value : document.getElementById('n-type').value,
        cote: parseFloat(isStrat ? document.getElementById('c-cote').value : document.getElementById('n-cote').value),
        mise: mise,
        book: bookName
    };

    book.v -= mise;
    state.l.push(newBet);
    save();
}

function resolveBet(id, win) {
    const idx = state.l.findIndex(b => b.id === id);
    const bet = state.l[idx];
    const book = state.b.find(b => b.n === bet.book);

    if (win) {
        const gain = bet.mise * bet.cote;
        book.v += gain;
        if (bet.isStrat) {
            const unit = state.u.find(u => u.n === bet.unit);
            unit.pr += (gain - bet.mise);
            unit.p = 1; // Reset au P1 après une gagne
        }
    } else {
        if (bet.isStrat) {
            const unit = state.u.find(u => u.n === bet.unit);
            unit.pr -= bet.mise;
            unit.p = unit.p < 5 ? unit.p + 1 : 1; // Monte au palier suivant ou reset si P5 perdu
        }
    }

    state.h.push({...bet, win: win, date: new Date().toLocaleDateString()});
    state.l.splice(idx, 1);
    save();
}

function renderLiveBets() {
    const stratTbody = document.getElementById('h-live-strat');
    stratTbody.innerHTML = state.l.map(b => `
        <tr>
            <td>${b.unit} - ${b.target}<br><small>${b.type} @${b.cote}</small></td>
            <td>${b.mise}€</td>
            <td style="text-align:right">
                <button class="btn-win" onclick="resolveBet(${b.id}, true)">G</button>
                <button class="btn-loss" onclick="resolveBet(${b.id}, false)">P</button>
            </td>
        </tr>
    `).join('');
}

// --- GESTION ADMIN ---
function addUnit() {
    const name = document.getElementById('u-n-add').value;
    if (!name) return;
    state.u.push({ n: name, s: parseInt(document.getElementById('u-s-add').value), p: 1, pr: 0 });
    save();
}

function showTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.getElementById(tabId).style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function renderSettings() {
    const list = document.getElementById('u-mgr-list');
    list.innerHTML = state.u.map((u, i) => `
        <tr>
            <td><b>${u.n}</b></td>
            <td>Strat ${u.s}</td>
            <td>P${u.p}</td>
            <td><button class="btn-mini-red" onclick="state.u.splice(${i},1); save()">X</button></td>
        </tr>
    `).join('');
}

// Lancement au démarrage
window.onload = render;
</script>
        </body>
</html>
