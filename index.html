<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - COMMAND CENTER V28.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
    :root {
        --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.7);
        --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
        --accent-cyan: #06b6d4;
        --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar - Reste intacte */
    .sidebar { width: 260px; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 20px 10px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
    .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 30px; text-align: center; color: white; border-bottom: 2px solid var(--ol-red); padding-bottom: 10px; }
    .logo span { color: var(--ol-red); }
    .nav-label { font-size: 10px; color: var(--ol-blue); letter-spacing: 2px; margin: 15px 0 5px 10px; font-weight: 800; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; color: #94a3b8; cursor: pointer; border: none; background: transparent; width: 100%; font-size: 12px; font-weight: 600; transition: 0.3s; margin-bottom: 3px; text-align: left;}
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: var(--ol-blue); color: #fff; box-shadow: 0 4px 12px rgba(0, 70, 167, 0.3); }

    /* Main */
    .main { flex-grow: 1; padding: 30px; overflow-y: auto; background-image: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
    .tab-content { display: none; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Stats Grid - Adaptatif */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .stat-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 20px; text-align: center; backdrop-filter: blur(10px); }
    .stat-val { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; display: block; margin-top: 5px; color: #fff; }

    /* Tables & Panels */
    .glass-panel { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { background: rgba(0, 70, 167, 0.5); text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-cyan); }
    td { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; }
    
    .form-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
    
    /* GRILLE TACTIQUE : Version Hybride PC (Ligne) / Mobile (Colonne) */
    .grid-tactical { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); /* 4 colonnes sur PC */
        gap: 15px; 
        margin-bottom: 20px;
    }

    .input-box-tactical { display: flex; flex-direction: column; gap: 8px; }
    .input-box-tactical label { font-size: 11px; font-weight: 900; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; }

    input, select { background: #1e293b; border: 1px solid var(--border); color: #ffffff; padding: 12px; border-radius: 8px; font-weight: 600; width: 100%; }

    /* Boutons de commande */
    .btn-action { background: linear-gradient(90deg, var(--ol-blue), var(--ol-red)); color: #fff; border: none; padding: 15px; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(218, 8, 18, 0.3); }
    .btn-win { background: #22c55e; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 10px; }
    .btn-loss { background: var(--ol-red); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 10px; }
    .btn-trash { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    
    /* Badges */
    .star-rating { color: #fbbf24; letter-spacing: 2px; }
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
    .badge-elite { background: var(--ol-blue); box-shadow: 0 0 10px rgba(0, 70, 167, 0.5); }
    .badge-normal { background: #475569; }

    /* --- MEDIA QUERY MOBILE : S'active uniquement sur téléphone --- */
    @media (max-width: 768px) {
        body { flex-direction: column; }
        .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 3px solid var(--ol-red); }
        .grid-tactical { grid-template-columns: 1fr; } /* On repasse en 1 colonne sur mobile */
        .stats-grid { grid-template-columns: 1fr; }
        .main { padding: 15px; }
    }
</style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GONES<span>45</span></div>
        <div class="nav-label">COMMAND CENTER</div>
        <button class="nav-item active" onclick="showTab('dash', this)"><i class="fa-solid fa-house"></i> Mur de Lyon</button>
        <button class="nav-item" onclick="showTab('cock', this)"><i class="fa-solid fa-jet-fighter-up"></i> Cockpit Strat</button>
        <button class="nav-item" onclick="showTab('p-norm', this)"><i class="fa-solid fa-ticket"></i> Pari Normal</button>
        
        <div class="nav-label">DATA & ARCHIVES</div>
        <button class="nav-item" onclick="showTab('arch-gen', this)"><i class="fa-solid fa-box-archive"></i> Archives Globales</button>
        
        <div class="nav-label">LOGISTIQUE</div>
        <button class="nav-item" onclick="showTab('bank-mgr', this)"><i class="fa-solid fa-vault"></i> Bankroll</button>
        <button class="nav-item" onclick="showTab('units-mgr', this)"><i class="fa-solid fa-users-gear"></i> Gestion Unités</button>

        <div class="nav-label">UNITÉS DÉPLOYÉES</div>
        <div id="unit-tabs-list"></div>
    </nav>

    <main class="main" id="main-content">
        <div id="dash" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-blue);"><label>CAPITAL TOTAL</label><span id="d-cap" class="stat-val">0€</span></div>
                <div class="stat-card" style="border-bottom: 4px solid #fbbf24;"><label>OBJECTIF</label><span id="d-obj" class="stat-val">30000€</span><button onclick="editGoal()" style="background:none; border:1px solid #fff; color:white; font-size:9px; cursor:pointer; padding:2px 5px; border-radius:4px; margin-top:5px;">EDITER</button></div>
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-red);"><label>BÉNÉFICE</label><span id="d-ben" class="stat-val">0€</span><button onclick="manualCalib()" style="background:none; border:1px solid #fff; color:white; font-size:9px; cursor:pointer; padding:2px 5px; border-radius:4px; margin-top:5px;">CALIBRER</button></div>
            </div>
            <div class="glass-panel">
                <table><thead><tr><th>UNITÉ</th><th>RANG</th><th>PALIER ACTUEL</th><th style="text-align:right">ÉTAT DE SERVICE</th></tr></thead><tbody id="dash-summary"></tbody></table>
            </div>
        </div>

        <div id="cock" class="tab-content">
            <div class="form-box">
                <div class="grid-tactical">
                    <div class="input-box-tactical"><label>Choix de l'Unité</label><select id="c-unit" onchange="updMise()"></select></div>
                    <div class="input-box-tactical"><label>Vecteur (Book)</label><select id="c-book"></select></div>
                    <div class="input-box-tactical"><label>Cote</label><input type="number" id="c-cote" value="2.00" step="0.01"></div>
                    <div class="input-box-tactical"><label>Mise Calculée (€)</label><input type="number" id="c-mise" style="border: 2px solid white; color: #22c55e;"></div>
                </div>
                <button class="btn-action" onclick="pari(true)">LANCER MISSION STRATÉGIQUE</button>
            </div>
            <div class="glass-panel">
                <div style="padding:15px; font-weight:800; background:var(--ol-blue); font-size:12px; letter-spacing:1px;">OPÉRATIONS STRATÉGIQUES EN COURS</div>
                <table><thead><tr><th>HEURE</th><th>UNITÉ</th><th>VECTEUR</th><th>PHASE</th><th>MISE</th><th style="text-align:right">RÉSULTAT</th></tr></thead><tbody id="h-live-strat"></tbody></table>
            </div>
        </div>

        <div id="p-norm" class="tab-content">
            <div class="form-box" style="border-left: 5px solid #475569;">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:20px; color:#94a3b8;"><i class="fa-solid fa-bolt" style="color: #fbbf24; margin-right:8px;"></i>DÉPLOIEMENT RAPIDE (HORS-STRATÉGIE)</h3>
                <div class="grid-tactical">
                    <div class="input-box-tactical"><label><i class="fa-solid fa-crosshairs"></i> CIBLE (ADVERSAIRE)</label><input id="n-target" placeholder="Ex: Man. City..."></div>
                    <div class="input-box-tactical"><label><i class="fa-solid fa-pen-nib"></i> TYPE DE MISSION</label><input id="n-desc" placeholder="Ex: Victoire..."></div>
                    <div class="input-box-tactical"><label><i class="fa-solid fa-layer-group"></i> VECTEUR</label><select id="n-book"></select></div>
                    <div class="input-box-tactical"><label><i class="fa-solid fa-chart-line"></i> COTE</label><input type="number" id="n-cote" value="1.50" step="0.01"></div>
                    <div class="input-box-tactical"><label><i class="fa-solid fa-wallet"></i> MISE (€)</label><input type="number" id="n-mise" placeholder="0.00"></div>
                </div>
                <button class="btn-action" style="background: linear-gradient(90deg, #334155, #475569);" onclick="pari(false)"><i class="fa-solid fa-paper-plane" style="margin-right:10px;"></i> ENGAGER LES FONDS</button>
            </div>
            <div class="glass-panel">
                <table><thead><tr><th>HEURE</th><th>CIBLE</th><th>MISSION</th><th>VECTEUR</th><th>MISE</th><th style="text-align:right;">ACTION</th></tr></thead><tbody id="h-live-norm"></tbody></table>
            </div>
        </div>

        <div id="arch-gen" class="tab-content">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
                <button class="btn-loss" onclick="clearAllArchives()" style="font-size: 12px; padding: 10px 20px;"><i class="fa-solid fa-dumpster-fire"></i> VIDER TOUTES LES ARCHIVES</button>
            </div>
            <div class="glass-panel">
                <table><thead><tr><th>DATE</th><th>TYPE</th><th>NOM</th><th>VECTEUR</th><th>MISE</th><th>NET</th><th style="text-align:right">ACTION</th></tr></thead><tbody id="arch-global-list"></tbody></table>
            </div>
        </div>

        <div id="bank-mgr" class="tab-content">
            <div class="form-box">
                <div style="display:grid; grid-template-columns: 1fr 150px; gap:15px; align-items:flex-end;">
                    <div><label>Ajouter un Vecteur</label><input id="new-bk-name" placeholder="Ex: PMU, Winamax..."></div>
                    <button class="btn-action" style="margin:0" onclick="addBook()">CRÉER</button>
                </div>
            </div>
            <div id="books-grid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:20px; margin-bottom:25px;"></div>
            <div class="form-box">
                <label>TRANSFERT DE DONNÉES (JSON)</label>
                <textarea id="io-data" rows="3" style="margin-bottom:15px; font-family:monospace; font-size:10px; color:#94a3b8;"></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <button class="btn-action" style="background:#334155" onclick="exportData()">GÉNÉRER CODE</button>
                    <button class="btn-action" style="background:var(--ol-blue)" onclick="importData()">IMPORTER CODE</button>
                </div>
            </div>
        </div>

        <div id="units-mgr" class="tab-content">
            <div class="form-box">
                <div style="display:grid; grid-template-columns: 1fr 120px 150px; gap:15px; align-items:flex-end;">
                    <div><label>Nom de la nouvelle unité</label><input id="u-n-add"></div>
                    <div><label>Étoiles</label><select id="u-s-add"><option value="1">⭐</option><option value="2">⭐⭐</option><option value="3">⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="5">⭐⭐⭐⭐⭐</option></select></div>
                    <button class="btn-action" style="margin:0" onclick="addUnit()">ENRÔLER</button>
                </div>
            </div>
            <div class="glass-panel"><table id="u-mgr-list"></table></div>
        </div>
    </main>

    <script>
        const MISES = [10, 20, 60, 180, 540, 1620, 4860, 14580]; 

        let state = JSON.parse(localStorage.getItem('gones_v28')) || {
            u: [], h: [], a: [], b: { winamax: 10000 }, start_bk: 10000, goal: 30000
        };

        function save() { localStorage.setItem('gones_v28', JSON.stringify(state)); render(); }

        function render() {
            const total = Object.values(state.b).reduce((a,v)=>a+parseFloat(v||0),0);
            document.getElementById('d-cap').innerText = total.toFixed(2)+"€";
            document.getElementById('d-ben').innerText = (total - state.start_bk).toFixed(2)+"€";
            document.getElementById('d-obj').innerText = (state.goal || 30000).toLocaleString()+"€";

            const bOpt = Object.keys(state.b).map(k=>`<option value="${k}">${k.toUpperCase()}</option>`).join('');
            document.getElementById('c-unit').innerHTML = state.u.map(u=>`<option value="${u.n}">${u.n} (P${u.l})</option>`).join('');
            document.getElementById('c-book').innerHTML = bOpt;
            document.getElementById('n-book').innerHTML = bOpt;

            document.getElementById('h-live-strat').innerHTML = state.h.filter(h=>h.isS).map(h=>rowLive(h)).join('');
            document.getElementById('h-live-norm').innerHTML = state.h.filter(h=>!h.isS).map(h=>rowLive(h)).join('');

            document.getElementById('unit-tabs-list').innerHTML = state.u.map(u => `<button class="nav-item" onclick="showUnitTab('${u.n}', this)"><i class="fa-solid fa-shield"></i> ${u.n}</button>`).join('');
            document.getElementById('dash-summary').innerHTML = state.u.map(u=>`<tr><td><b>${u.n}</b></td><td class="star-rating">${"⭐".repeat(u.s)}</td><td style="color:#3b82f6; font-weight:800;">PALIER ${u.l}</td><td style="text-align:right"><span class="badge badge-elite">ACTIF</span></td></tr>`).join('');
            document.getElementById('u-mgr-list').innerHTML = state.u.map((u,i)=>`<tr><td><b>${u.n}</b></td><td>${"⭐".repeat(u.s)}</td><td>P${u.l}</td><td style="text-align:right"><button onclick="delUnit(${i})" class="btn-trash"><i class="fa-solid fa-trash-can"></i></button></td></tr>`).join('');
            document.getElementById('arch-global-list').innerHTML = state.a.map((a, i)=>`<tr><td>${a.d}</td><td><span class="badge ${a.isS?'badge-elite':'badge-normal'}">${a.isS?'ÉLITE':'NORMAL'}</span></td><td>${a.n}</td><td>${a.b.toUpperCase()}</td><td>${a.m}€</td><td style="color:${a.w?'#22c55e':'#ff4d4d'}">${a.w?'+'+a.p+'€':'-'+a.m+'€'}</td><td style="text-align:right"><button onclick="deleteArchItem(${i})" class="btn-trash"><i class="fa-solid fa-trash-can"></i></button></td></tr>`).join('');

            document.getElementById('books-grid').innerHTML = Object.keys(state.b).map(k=>`<div class="stat-card"><label>${k.toUpperCase()}</label><input type="number" value="${state.b[k]}" onchange="state.b['${k}']=this.value;save()" style="text-align:center; font-size:20px; font-weight:900; background:transparent; border:none; color:white"><button class="btn-trash" onclick="delBook('${k}')" style="margin-top:10px; font-size:10px;">SUPPRIMER VECTEUR</button></div>`).join('');
            updMise();
        }

        function rowLive(h) {
            const displayTarget = h.isS ? `<b>${h.n}</b>` : `<span style="color:var(--accent-cyan)">${h.target}</span>`;
            const displayDesc = h.isS ? `PHASE ${h.l}` : h.n;
            return `<tr><td>${h.t}</td><td>${displayTarget}</td><td>${displayDesc}</td><td>${h.b.toUpperCase()}</td><td><b>${h.m}€</b></td><td style="text-align:right"><button class="btn-win" onclick="resolve('${h.id}',true)">GAGNÉ</button> <button class="btn-loss" onclick="resolve('${h.id}',false)">PERDU</button></td></tr>`;
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            if(document.getElementById('dyn-unit')) document.getElementById('dyn-unit').remove();
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        }

        function showUnitTab(name, btn) {
            const u = state.u.find(x => x.n === name);
            const arch = state.a.filter(x => x.n === name);
            const wins = arch.filter(x=>x.w).length; const loss = arch.filter(x=>!x.w).length;
            const net = arch.reduce((acc,curr)=> acc + parseFloat(curr.p || -curr.m), 0).toFixed(2);
            if(document.getElementById('dyn-unit')) document.getElementById('dyn-unit').remove();
            const div = document.createElement('div');
            div.id = 'dyn-unit'; div.className = 'tab-content active';
            div.innerHTML = `<h2 style="font-family:'Orbitron'; margin-bottom:25px; color:var(--ol-blue)">RAPPORT TACTIQUE : ${name.toUpperCase()}</h2>
                <div class="stats-grid"><div class="stat-card"><label>RANG</label><span class="star-rating">${"⭐".repeat(u.s)}</span></div><div class="stat-card"><label>MISSIONS</label><span class="stat-val">${wins} G / ${loss} P</span></div><div class="stat-card"><label>NET UNITÉ</label><span class="stat-val" style="color:${net>=0?'#22c55e':'#ff4d4d'}">${net}€</span></div></div>
                <div style="display:grid; grid-template-columns: 1fr 350px; gap:20px;"><div class="glass-panel"><table><thead><tr><th>DATE</th><th>VECTEUR</th><th>PALIER</th><th>RÉSULTAT</th></tr></thead><tbody>${arch.map(a=>`<tr><td>${a.d}</td><td>${a.b.toUpperCase()}</td><td>P${a.l}</td><td style="color:${a.w?'#22c55e':'#ff4d4d'}">${a.w?'+'+a.p+'€':'-'+a.m+'€'}</td></tr>`).join('')}</tbody></table></div>
                <div class="glass-panel" style="padding:20px;"><div style="height:250px;"><canvas id="chart-${name}"></canvas></div></div></div>`;
            document.getElementById('main-content').appendChild(div);
            document.querySelectorAll('.tab-content:not(#dyn-unit)').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); btn.classList.add('active');
            new Chart(document.getElementById(`chart-${name}`), { type: 'doughnut', data: { labels: ['Succès','Échec'], datasets: [{ data: [wins, loss], backgroundColor: ['#22c55e', '#da0812'], borderWidth: 0 }] }, options: { maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'white'}}} } });
        }

        function updMise() {
            const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
            if(u) document.getElementById('c-mise').value = MISES[u.l-1];
        }

        function pari(isS) {
            let n, b, c, m, target = "", l = 1;
            if (isS) {
                const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
                if (!u) return; n = u.n; b = document.getElementById('c-book').value; c = parseFloat(document.getElementById('c-cote').value); m = parseFloat(document.getElementById('c-mise').value); l = u.l; target = "MISSION STRATÉGIQUE";
            } else {
                target = document.getElementById('n-target').value || "Inconnue"; n = document.getElementById('n-desc').value || "Normal"; b = document.getElementById('n-book').value; c = parseFloat(document.getElementById('n-cote').value); m = parseFloat(document.getElementById('n-mise').value);
            }
            if (isNaN(m) || m <= 0) return alert("Mise invalide");
            const curBK = parseFloat(state.b[b] || 0);
            if (curBK >= m) {
                state.b[b] = (curBK - m).toFixed(2);
                state.h.unshift({ id: Date.now(), n: n, target: target, b: b, l: l, m: m, cote: c, isS: isS, t: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) });
                if (isS) { const u = state.u.find(x => x.n === n); if (u && u.l < 8) u.l++; }
                save(); if(!isS) document.getElementById('n-target').value = "";
            } else { alert("Solde insuffisant"); }
        }

        function resolve(id, win) {
            const h = state.h.find(x=>x.id == id); if(!h) return;
            let profit = 0;
            if(win) {
                profit = (h.m * h.cote) - h.m;
                state.b[h.b] = (parseFloat(state.b[h.b]) + (h.m * h.cote)).toFixed(2);
                if(h.isS) { const u=state.u.find(x=>x.n==h.n); if(u) u.l=1; state.h = state.h.filter(x => x.n !== h.n); }
                else { state.h = state.h.filter(x=>x.id != id); }
            } else { state.h = state.h.filter(x=>x.id != id); }
            state.a.unshift({...h, w:win, p:profit.toFixed(2), d:new Date().toLocaleDateString()});
            save();
        }

        function manualCalib() { const t=Object.values(state.b).reduce((a,v)=>a+parseFloat(v||0),0); const v=prompt("Bénéfice actuel ?"); if(v!==null){state.start_bk=t-parseFloat(v); save();}}
        function editGoal() { const g=prompt("Objectif ?"); if(g){state.goal=parseFloat(g); save();}}
        function addBook() { const n=document.getElementById('new-bk-name').value; if(n){state.b[n.toLowerCase()]=0; save();}}
        function delBook(k) { if(confirm('Supprimer '+k+' ?')){delete state.b[k]; save();}}
        function addUnit() { const n=document.getElementById('u-n-add').value; if(n){state.u.push({n:n,l:1,s:parseInt(document.getElementById('u-s-add').value)}); save();}}
        function delUnit(i) { if(confirm('Supprimer cette unité ?')){state.u.splice(i,1); save();}}
        function deleteArchItem(index) { if(confirm("Supprimer cette archive ?")) { state.a.splice(index, 1); save(); } }
        function clearAllArchives() { if(prompt("Tape 'EFFACER' pour vider :") === "EFFACER") { state.a = []; save(); } }
        function exportData() { document.getElementById('io-data').value = btoa(JSON.stringify(state)); }
        function importData() { try { state=JSON.parse(atob(document.getElementById('io-data').value)); save(); location.reload(); } catch(e){alert('Code corrompu');}}

        window.onload = render;
    </script>
</body>
</html>
