<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - COMMAND CENTER V28.5</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
            --accent-cyan: #06b6d4; --border: rgba(255, 255, 255, 0.1);
            --green: #22c55e; --gray: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR & MOBILE NAV --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 20px 10px; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--ol-red); padding-bottom: 10px; letter-spacing: 2px; }
        .nav-label { font-size: 10px; color: var(--ol-blue); font-weight: 800; text-transform: uppercase; margin: 15px 0 5px 10px; letter-spacing: 1px; }
        
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; color: var(--gray); cursor: pointer; border: none; background: transparent; font-weight: 600; width: 100%; transition: 0.3s; margin-bottom: 3px; font-size: 13px; }
        .nav-item i { width: 20px; font-size: 1.1rem; }
        .nav-item.active { background: var(--ol-blue); color: #fff; box-shadow: 0 4px 15px rgba(0, 70, 167, 0.4); }

        /* --- CONTENU --- */
        .main { flex-grow: 1; padding: 2rem; overflow-y: auto; background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); scroll-behavior: smooth; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GRIDS & CARDS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card); border-radius: 18px; border: 1px solid var(--border); padding: 1.5rem; backdrop-filter: blur(12px); text-align: center; }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; display: block; margin-top: 5px; }

        /* --- TABLES --- */
        .glass-panel { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: rgba(0, 70, 167, 0.4); text-align: left; padding: 12px; font-size: 10px; text-transform: uppercase; color: var(--accent-cyan); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        /* --- FORMULAIRES --- */
        .form-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid-tactical { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-weight: 600; }
        .btn-action { background: linear-gradient(90deg, var(--ol-blue), var(--ol-red)); color: #fff; border: none; padding: 15px; border-radius: 10px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; flex-direction: row; padding: 0.5rem; border-right: none; border-top: 3px solid var(--ol-red); z-index: 1000; justify-content: space-around; overflow: hidden;}
            .logo, .nav-label { display: none; }
            .nav-item { flex-direction: column; font-size: 0.6rem; gap: 0.3rem; padding: 0.5rem; flex: 1; align-items: center; margin-bottom: 0; }
            .nav-item i { font-size: 1.2rem; }
            .main { padding: 1rem; padding-bottom: 90px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GONES<span>45</span></div>
        <div class="nav-label">COMMAND</div>
        <button class="nav-item active" onclick="showTab('dash', this)"><i class="fa-solid fa-house"></i><span>Mur</span></button>
        <button class="nav-item" onclick="showTab('cock', this)"><i class="fa-solid fa-jet-fighter-up"></i><span>Cockpit</span></button>
        <button class="nav-item" onclick="showTab('p-norm', this)"><i class="fa-solid fa-ticket"></i><span>Pari</span></button>
        <div class="nav-label">DATA</div>
        <button class="nav-item" onclick="showTab('bank-mgr', this)"><i class="fa-solid fa-vault"></i><span>Bankroll</span></button>
        <button class="nav-item" onclick="showTab('history', this)"><i class="fa-solid fa-list-ul"></i><span>Archives</span></button>
    </nav>

    <main class="main">
        <div id="dash" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-blue);">
                    <span style="font-size: 0.7rem; color: var(--gray);">CAPITAL TOTAL</span>
                    <span id="d-cap" class="stat-val">0€</span>
                </div>
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-red);">
                    <span style="font-size: 0.7rem; color: var(--gray);">BÉNÉFICE</span>
                    <span id="d-ben" class="stat-val">0€</span>
                </div>
            </div>
            
            <div class="stat-card" style="margin-bottom: 1.5rem; height: 300px;">
                <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; color: var(--accent-cyan); margin-bottom: 10px;">COURBE DE CROISSANCE</h3>
                <canvas id="mainChart"></canvas>
            </div>

            <div class="glass-panel">
                <table>
                    <thead><tr><th>UNITÉ</th><th>PALIER</th><th style="text-align:right">ÉTAT</th></tr></thead>
                    <tbody id="dash-summary"></tbody>
                </table>
            </div>
        </div>

        <div id="cock" class="tab-content">
            <div class="form-box">
                <h3 style="font-family: 'Orbitron'; font-size: 12px; color: var(--ol-red); margin-bottom: 15px;">MISSION STRATÉGIQUE</h3>
                <div class="grid-tactical">
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label style="font-size:9px; color:var(--accent-cyan)">UNITÉ</label>
                        <select id="c-unit" onchange="updMise()"></select>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label style="font-size:9px; color:var(--accent-cyan)">VECTEUR</label>
                        <select id="c-book"></select>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label style="font-size:9px; color:var(--accent-cyan)">COTE</label>
                        <input type="number" id="c-cote" value="1.50" step="0.01">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label style="font-size:9px; color:white">MISE (€)</label>
                        <input type="number" id="c-mise" style="border: 2px solid white; color: var(--green);">
                    </div>
                </div>
                <button class="btn-action" onclick="pari(true)">LANCER LA PHASE</button>
            </div>
            
            <div class="glass-panel">
                <div style="padding:12px; font-weight:800; background:var(--ol-blue); font-size:11px;">OPÉRATIONS EN COURS</div>
                <table><tbody id="h-live-strat"></tbody></table>
            </div>
        </div>

        <div id="p-norm" class="tab-content">
            <div class="form-box">
                <h3 style="font-family: 'Orbitron'; font-size: 12px; color: var(--gray); margin-bottom: 15px;">DÉPLOIEMENT LIBRE</h3>
                <input id="n-target" placeholder="Match / Événement" style="margin-bottom:10px;">
                <div class="grid-tactical">
                    <select id="n-book"></select>
                    <input type="number" id="n-cote" placeholder="Cote">
                    <input type="number" id="n-mise" placeholder="Mise (€)">
                </div>
                <button class="btn-action" style="background: #334155;" onclick="pari(false)">ENGAGER FONDS RAPIDES</button>
            </div>
        </div>

        <div id="bank-mgr" class="tab-content">
            <div id="books-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;"></div>
            <div class="form-box">
                <textarea id="io-data" rows="3" style="font-family:monospace; font-size:9px; margin-bottom:10px;" placeholder="Code de sauvegarde..."></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-action" style="background:#334155; font-size:10px;" onclick="exportData()">SAUVEGARDER</button>
                    <button class="btn-action" style="background:var(--ol-blue); font-size:10px;" onclick="importData()">CHARGER</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const MISES = [10, 20, 60, 180, 540, 1620, 4860, 14580]; 
        let state = JSON.parse(localStorage.getItem('gones_v28')) || {
            u: [{n:"Boca", s:5, l:1}, {n:"Palmeiras", s:4, l:1}], 
            h: [], a: [], b: { winamax: 10000 }, start_bk: 10000, goal: 30000
        };

        function save() { localStorage.setItem('gones_v28', JSON.stringify(state)); render(); }

        function render() {
            const total = Object.values(state.b).reduce((a,v)=>a+parseFloat(v||0),0);
            document.getElementById('d-cap').innerText = total.toFixed(2)+"€";
            document.getElementById('d-ben').innerText = (total - state.start_bk).toFixed(2)+"€";

            const bOpt = Object.keys(state.b).map(k=>`<option value="${k}">${k.toUpperCase()}</option>`).join('');
            document.getElementById('c-unit').innerHTML = state.u.map(u=>`<option value="${u.n}">${u.n}</option>`).join('');
            document.getElementById('c-book').innerHTML = bOpt;
            document.getElementById('n-book').innerHTML = bOpt;

            document.getElementById('h-live-strat').innerHTML = state.h.filter(h=>h.isS).map(h=>`
                <tr><td>${h.n}</td><td>P${h.l}</td><td>${h.m}€</td>
                <td style="text-align:right">
                    <button onclick="resolve('${h.id}',true)" style="background:var(--green); border:none; padding:5px; color:white; border-radius:4px; font-size:10px;">W</button>
                    <button onclick="resolve('${h.id}',false)" style="background:var(--ol-red); border:none; padding:5px; color:white; border-radius:4px; font-size:10px;">L</button>
                </td></tr>`).join('');
            
            document.getElementById('dash-summary').innerHTML = state.u.map(u=>`
                <tr><td><b>${u.n}</b></td><td><span style="color:var(--accent-cyan)">P${u.l}</span></td>
                <td style="text-align:right"><span style="font-size:9px; background:var(--ol-blue); padding:3px 6px; border-radius:4px;">ACTIF</span></td></tr>`).join('');
            
            document.getElementById('books-grid').innerHTML = Object.keys(state.b).map(k=>`
                <div class="stat-card" style="padding:10px;">
                    <span style="font-size:9px;">${k.toUpperCase()}</span>
                    <input type="number" value="${state.b[k]}" onchange="state.b['${k}']=this.value;save()" style="background:transparent; border:none; text-align:center; font-size:14px;">
                </div>`).join('');
            updMise();
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        }

        function updMise() {
            const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
            if(u) document.getElementById('c-mise').value = MISES[u.l-1];
        }

        function pari(isS) {
            let n, b, c, m, l = 1;
            if (isS) {
                const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
                n = u.n; b = document.getElementById('c-book').value; c = parseFloat(document.getElementById('c-cote').value); m = parseFloat(document.getElementById('c-mise').value); l = u.l;
            } else {
                n = document.getElementById('n-target').value; b = document.getElementById('n-book').value; c = parseFloat(document.getElementById('n-cote').value); m = parseFloat(document.getElementById('n-mise').value);
            }
            if (state.b[b] >= m) {
                state.b[b] = (parseFloat(state.b[b]) - m).toFixed(2);
                state.h.unshift({ id: Date.now(), n: n, b: b, l: l, m: m, cote: c, isS: isS });
                if (isS) { const u = state.u.find(x => x.n === n); if (u && u.l < 8) u.l++; }
                save();
            } else { alert("Solde insuffisant"); }
        }

        function resolve(id, win) {
            const h = state.h.find(x=>x.id == id);
            if(win) {
                state.b[h.b] = (parseFloat(state.b[h.b]) + (h.m * h.cote)).toFixed(2);
                if(h.isS) { const u=state.u.find(x=>x.n==h.n); if(u) u.l=1; }
            }
            state.h = state.h.filter(x=>x.id != id);
            save();
        }

        function exportData() { document.getElementById('io-data').value = btoa(JSON.stringify(state)); }
        function importData() { state=JSON.parse(atob(document.getElementById('io-data').value)); save(); location.reload(); }

        window.onload = () => {
            render();
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { labels: ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'], datasets: [{ data: [1000, 1020, 1010, 1080, 1150, 1200, 1250], borderColor: '#0046a7', tension: 0.4, fill: true, backgroundColor: 'rgba(0,70,167,0.2)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        };
    </script>
</body>
</html>
