<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - COMMAND CENTER V28.2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
            --accent-cyan: #06b6d4; --border: rgba(255, 255, 255, 0.1);
            --green: #22c55e; --gray: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- NAVIGATION --- */
        .sidebar { width: 16rem; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 1.5rem 1rem; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--ol-red); padding-bottom: 0.5rem; letter-spacing: 2px; }
        .nav-label { font-size: 0.7rem; color: var(--ol-blue); font-weight: 800; text-transform: uppercase; margin: 1rem 0 0.5rem 0.5rem; letter-spacing: 1px; }
        
        .nav-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1rem; border-radius: 10px; color: var(--gray); cursor: pointer; border: none; background: transparent; font-weight: 600; width: 100%; text-align: left; transition: 0.3s; margin-bottom: 0.2rem; }
        .nav-item i { width: 20px; font-size: 1.1rem; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: var(--ol-blue); color: #fff; box-shadow: 0 4px 15px rgba(0, 70, 167, 0.4); }

        /* --- CONTENU --- */
        .main { flex-grow: 1; padding: 2rem; overflow-y: auto; background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); scroll-behavior: smooth; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- COMPOSANTS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card); border-radius: 18px; border: 1px solid var(--border); padding: 1.5rem; backdrop-filter: blur(12px); margin-bottom: 1.5rem; position: relative; }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; display: block; margin-top: 0.5rem; }
        
        .chart-container { height: 300px; margin-top: 1rem; width: 100%; }

        /* --- FORMULAIRE --- */
        .form-box { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 1rem; }
        input { background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; font-family: 'Inter'; font-size: 0.9rem; }
        .full-width { grid-column: span 2; }
        .btn-action { grid-column: span 2; background: var(--ol-red); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 800; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 1px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.98); }

        /* --- TABLEAU --- */
        .table-wrapper { overflow-x: auto; margin-top: 1rem; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: rgba(0,0,0,0.2); }
        th { text-align: left; padding: 14px; color: var(--accent-cyan); border-bottom: 2px solid var(--border); font-family: 'Orbitron'; font-size: 0.7rem; }
        td { padding: 14px; border-bottom: 1px solid var(--border); }
        .badge { padding: 4px 8px; border-radius: 5px; font-weight: 800; font-size: 0.7rem; }
        .win { background: rgba(34, 197, 94, 0.2); color: var(--green); }
        .wait { background: rgba(148, 163, 184, 0.2); color: var(--gray); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; flex-direction: row; padding: 0.5rem; border-right: none; border-top: 3px solid var(--ol-red); z-index: 1000; justify-content: space-around; }
            .logo, .nav-label { display: none; }
            .nav-item { flex-direction: column; font-size: 0.6rem; gap: 0.3rem; padding: 0.5rem; flex: 1; align-items: center; margin-bottom: 0; }
            .nav-item i { font-size: 1.3rem; }
            .main { padding: 1rem; padding-bottom: 90px; }
            .stats-grid { gap: 1rem; }
            .form-box { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .btn-action { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GONES45</div>
        <div class="nav-label">Main</div>
        <button class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-th-large"></i><span>Mur de Lyon</span></button>
        <button class="nav-item" onclick="showTab('cockpit', this)"><i class="fas fa-crosshairs"></i><span>Cockpit Strat</span></button>
        <div class="nav-label">Data</div>
        <button class="nav-item" onclick="showTab('bankroll', this)"><i class="fas fa-chart-pie"></i><span>Bankroll</span></button>
        <button class="nav-item" onclick="showTab('history', this)"><i class="fas fa-list"></i><span>Historique</span></button>
    </nav>

    <main class="main">
        <section id="home" class="section active">
            <div class="stats-grid">
                <div class="stat-card" style="border-left: 4px solid var(--ol-blue);">
                    <span style="color: var(--accent-cyan); font-weight: 800; font-size: 0.7rem;">CAPITAL GLOBAL</span>
                    <span class="stat-val">10 000.00€</span>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--ol-red);">
                    <span style="color: var(--ol-red); font-weight: 800; font-size: 0.7rem;">UNITÉ DE MISE</span>
                    <span class="stat-val">50.00€</span>
                </div>
            </div>
            <div class="stat-card">
                <h3 style="font-family: Orbitron; font-size: 0.9rem; color: var(--accent-cyan);"><i class="fas fa-chart-line"></i> ÉVOLUTION</h3>
                <div class="chart-container"><canvas id="chartMain"></canvas></div>
            </div>
        </section>

        <section id="cockpit" class="section">
            <div class="stat-card">
                <h3 style="font-family: Orbitron; color: var(--ol-red);"><i class="fas fa-plus-circle"></i> NOUVEAU TICKET</h3>
                <div class="form-box">
                    <input type="text" class="full-width" id="f_match" placeholder="Match (ex: Boca Juniors vs Huracan)">
                    <input type="number" id="f_odds" placeholder="Cote (1.50+)" step="0.01">
                    <input type="number" id="f_stake" placeholder="Mise (€)">
                    <input type="text" class="full-width" id="f_strat" placeholder="Stratégie (ex: Qualif + Under 3.5)">
                    <button class="btn-action" onclick="saveBet()">VALIDER SUR WINAMAX</button>
                </div>
            </div>
        </section>

        <section id="bankroll" class="section">
            <div class="stat-card">
                <h3 style="font-family: Orbitron; margin-bottom:1rem;">PERFORMANCE PAR ÉQUIPE</h3>
                <div class="chart-container"><canvas id="chartTeams"></canvas></div>
            </div>
        </section>

        <section id="history" class="section">
            <div class="stat-card" style="padding: 0;">
                <h3 style="font-family: Orbitron; padding: 1.5rem; font-size: 0.9rem;">LOG DES PARIS</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>Match</th><th>Stratégie</th><th>Cote</th><th>Mise</th><th>Résultat</th></tr>
                        </thead>
                        <tbody id="logTable">
                            <tr>
                                <td>Boca Juniors</td>
                                <td>Qualif & Under 3.5</td>
                                <td>1.54</td>
                                <td>50€</td>
                                <td><span class="badge win">GAGNÉ</span></td>
                            </tr>
                            <tr>
                                <td>Palmeiras</td>
                                <td>DC & Over 1.5</td>
                                <td>1.45</td>
                                <td>30€</td>
                                <td><span class="badge wait">EN ATTENTE</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- NAVIGATION LOGIQUE ---
        function showTab(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- GRAPHIQUES ---
        const c1 = document.getElementById('chartMain').getContext('2d');
        new Chart(c1, {
            type: 'line',
            data: {
                labels: ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'],
                datasets: [{
                    label: 'Capital',
                    data: [1000, 1020, 1010, 1080, 1150, 1120, 1250],
                    borderColor: '#0046a7',
                    backgroundColor: 'rgba(0, 70, 167, 0.2)',
                    fill: true, tension: 0.4, pointRadius: 5, pointBackgroundColor: '#da0812'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        const c2 = document.getElementById('chartTeams').getContext('2d');
        new Chart(c2, {
            type: 'bar',
            data: {
                labels: ['Boca', 'PSV', 'Palmeiras', 'LAFC'],
                datasets: [{
                    data: [120, 85, 195, -30],
                    backgroundColor: ['#0046a7', '#da0812', '#0046a7', '#334155'],
                    borderRadius: 8
                }]
            },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // --- SAUVEGARDE (DÉMO) ---
        function saveBet() {
            const m = document.getElementById('f_match').value;
            if(!m) return alert("Remplis au moins l'équipe !");
            alert("Pari sur " + m + " enregistré !");
            showTab('history', document.querySelectorAll('.nav-item')[3]);
        }
    </script>
</body>
</html>
