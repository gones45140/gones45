<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - COMMAND CENTER V29.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
            --accent-cyan: #06b6d4; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Navigation */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 20px 10px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 25px; text-align: center; border-bottom: 2px solid var(--ol-red); padding-bottom: 10px; }
        .nav-label { font-size: 10px; color: var(--ol-blue); letter-spacing: 2px; margin: 15px 0 5px 10px; font-weight: 800; text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; color: #94a3b8; cursor: pointer; border: none; background: transparent; width: 100%; font-size: 12px; font-weight: 600; text-align: left; transition: 0.3s; }
        .nav-item.active { background: var(--ol-blue); color: #fff; box-shadow: 0 4px 12px rgba(0, 70, 167, 0.3); }

        /* Contenu */
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; background-image: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 15px; text-align: center; backdrop-filter: blur(8px); }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; display: block; color: #fff; margin-top: 5px; }

        .glass-panel { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: rgba(0, 70, 167, 0.4); text-align: left; padding: 12px; font-size: 10px; text-transform: uppercase; color: var(--accent-cyan); }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .form-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid-tactical { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 15px; }
        label { font-size: 9px; font-weight: 800; color: var(--accent-cyan); text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 14px; }
        
        .btn-action { background: linear-gradient(90deg, var(--ol-blue), var(--ol-red)); color: #fff; border: none; padding: 14px; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-win { background: #22c55e; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-weight: 800; cursor: pointer; }
        .btn-loss { background: var(--ol-red); color: white; border: none; padding: 6px 10px; border-radius: 4px; font-weight: 800; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 65px; position: fixed; bottom: 0; flex-direction: row; padding: 0; border-right: none; border-top: 3px solid var(--ol-red); z-index: 100; }
            .logo, .nav-label { display: none; }
            .nav-item { flex-direction: column; font-size: 8px; gap: 4px; justify-content: center; align-items: center; flex: 1; border-radius: 0; }
            .nav-item i { font-size: 16px; }
            .main { padding: 15px; padding-bottom: 80px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GONES<span>45</span></div>
        <div class="nav-label">MENU</div>
        <button class="nav-item active" onclick="showTab('dash', this)"><i class="fa-solid fa-house"></i> MUR</button>
        <button class="nav-item" onclick="showTab('cock', this)"><i class="fa-solid fa-jet-fighter-up"></i> COCKPIT</button>
        <button class="nav-item" onclick="showTab('p-norm', this)"><i class="fa-solid fa-ticket"></i> PARI</button>
        <button class="nav-item" onclick="showTab('arch', this)"><i class="fa-solid fa-box-archive"></i> ARCHIVE</button>
        <button class="nav-item" onclick="showTab('bank-mgr', this)"><i class="fa-solid fa-vault"></i> BANKROLL</button>
        <button class="nav-item" onclick="showTab('units-mgr', this)"><i class="fa-solid fa-users-gear"></i> UNITÉS</button>
    </nav>

  <main class="main">
    <!-- MUR -->
    <div id="dash" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card" style="border-bottom: 4px solid var(--ol-blue);"><label>CAPITAL</label><span id="d-cap" class="stat-val">0€</span></div>
            <div class="stat-card" style="border-bottom: 4px solid var(--ol-red);"><label>BÉNÉFICE</label><span id="d-ben" class="stat-val">0€</span></div>
        </div>
        <div class="glass-panel">
            <table style="min-width: 100%;">
                <thead><tr><th>UNITÉ</th><th>RANG</th><th>PALIER</th><th style="text-align:right">ÉTAT</th></tr></thead>
                <tbody id="dash-summary"></tbody>
            </table>
        </div>
    </div>

    <!-- ARCHIVE -->
    <div id="arch" class="tab-content">
        <div class="glass-panel">
            <table>
                <thead><tr><th>DATE</th><th>UNITÉ / CIBLE</th><th>COTE</th><th>MISE</th><th>RÉSULTAT</th><th style="text-align:right">GAIN</th></tr></thead>
                <tbody id="arch-list"></tbody>
            </table>
        </div>
        <button class="btn-action" style="background:var(--ol-red); width:auto; padding:10px 20px;" onclick="if(confirm('Vider l\'archive ?')){state.a=[];save();}">VIDER L'ARCHIVE</button>
    </div>

    <!-- COCKPIT -->
    <div id="cock" class="tab-content">
        <div class="form-box">
            <div class="grid-tactical">
                <div><label>Unité</label><select id="c-unit" onchange="updMise()"></select></div>
                <div><label>Vecteur</label><select id="c-book"></select></div>
                <div><label>Cote</label><input type="number" id="c-cote" value="2.00" step="0.01"></div>
                <div><label>Mise (€)</label><input type="number" id="c-mise" style="border: 1px solid #22c55e;"></div>
            </div>
            <button class="btn-action" onclick="pari(true)">DÉPLOYER STRATÉGIE</button>
        </div>
        <div class="glass-panel">
            <table><thead><tr><th>DATE</th><th>UNITÉ</th><th>PHASE</th><th>MISE</th><th style="text-align:right">ACTION</th></tr></thead><tbody id="h-live-strat"></tbody></table>
        </div>
    </div>

    <!-- PARI NORMAL -->
    <div id="p-norm" class="tab-content">
        <div class="form-box">
            <div class="grid-tactical">
                <div><label>Cible</label><input id="n-target" placeholder="Equipe..."></div>
                <div><label>Type</label><input id="n-desc" placeholder="Win/Over..."></div>
                <div><label>Vecteur</label><select id="n-book"></select></div>
                <div><label>Cote</label><input type="number" id="n-cote" value="1.50" step="0.01"></div>
                <div><label>Mise</label><input type="number" id="n-mise" placeholder="0"></div>
            </div>
            <button class="btn-action" style="background:#334155" onclick="pari(false)">ENGAGER PARI SIMPLE</button>
        </div>
        <div class="glass-panel">
            <table><thead><tr><th>DATE</th><th>CIBLE</th><th>MISE</th><th style="text-align:right">ACTION</th></tr></thead><tbody id="h-live-norm"></tbody></table>
        </div>
    </div>

    <!-- BANKROLL -->
    <div id="bank-mgr" class="tab-content">
        <div class="form-box">
            <label>NOUVEAU VECTEUR</label>
            <div style="display:flex; gap:10px; margin-top:5px;">
                <input id="new-bk-name" placeholder="Nom du book...">
                <button class="btn-action" style="width:100px; margin:0;" onclick="addBook()">CRÉER</button>
            </div>
        </div>
        <div id="books-grid" class="stats-grid"></div>
        <div class="form-box">
            <textarea id="io-data" rows="3" placeholder="Code JSON..." style="font-size:10px;"></textarea>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <button class="btn-action" style="background:#334155" onclick="exportData()">SAUVEGARDER</button>
                <button class="btn-action" style="background:var(--ol-blue)" onclick="importData()">CHARGER</button>
            </div>
        </div>
    </div>

    <!-- UNITÉS -->
    <div id="units-mgr" class="tab-content">
        <div class="form-box">
            <label>NOUVELLE UNITÉ</label>
            <div style="display:grid; grid-template-columns: 1fr 100px 100px; gap:10px; margin-top:5px;">
                <input id="u-n-add" placeholder="Nom...">
                <select id="u-s-add">
                    <option value="1">⭐</option><option value="2">⭐⭐</option>
                    <option value="3">⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option>
                    <option value="5">⭐⭐⭐⭐⭐</option>
                </select>
                <button class="btn-action" style="margin:0" onclick="addUnit()">AJOUTER</button>
            </div>
        </div>
        <div class="glass-panel">
            <table><thead><tr><th>NOM</th><th>RANG</th><th>PALIER</th><th style="text-align:right">ACTION</th></tr></thead><tbody id="u-mgr-list"></tbody></table>
        </div>
    </div>
</main>

    <script>
        const MISES = [10, 20, 60, 180, 540, 1620, 4860, 14580]; 
        let state = JSON.parse(localStorage.getItem('gones_v28')) || {
            u: [], h: [], a: [], b: { winamax: 10000 }, start_bk: 10000
        };

        function save() { localStorage.setItem('gones_v28', JSON.stringify(state)); render(); }

        function render() {
            const total = Object.values(state.b).reduce((a,v)=>a+parseFloat(v||0),0);
            document.getElementById('d-cap').innerText = total.toFixed(2)+"€";
            document.getElementById('d-ben').innerText = (total - state.start_bk).toFixed(2)+"€";

            const bOpt = Object.keys(state.b).map(k=>`<option value="${k}">${k.toUpperCase()}</option>`).join('');
            document.getElementById('c-unit').innerHTML = state.u.map(u=>`<option value="${u.n}">${u.n} (P${u.l})</option>`).join('');
            document.getElementById('c-book').innerHTML = bOpt;
            document.getElementById('n-book').innerHTML = bOpt;

            // MUR DE LYON (Avec Etoiles)
            document.getElementById('dash-summary').innerHTML = state.u.map(u=>`
                <tr>
                    <td><b>${u.n}</b></td>
                    <td style="color:#fbbf24; letter-spacing:2px;">${"⭐".repeat(u.s)}</td>
                    <td style="color:#3b82f6; font-weight:800;">PALIER ${u.l}</td>
                    <td style="text-align:right"><span style="background:var(--ol-blue); padding:3px 8px; border-radius:4px; font-size:10px; font-weight:900;">ACTIF</span></td>
                </tr>`).join('');

            document.getElementById('h-live-strat').innerHTML = state.h.filter(h=>h.isS).map(h=>`<tr><td>${h.t}</td><td><b>${h.n}</b></td><td>P${h.l}</td><td>${h.m}€</td><td style="text-align:right"><button class="btn-win" onclick="resolve('${h.id}',true)">W</button> <button class="btn-loss" onclick="resolve('${h.id}',false)">L</button></td></tr>`).join('');
            document.getElementById('h-live-norm').innerHTML = state.h.filter(h=>!h.isS).map(h=>`<tr><td>${h.t}</td><td>${h.target}</td><td>${h.m}€</td><td style="text-align:right"><button class="btn-win" onclick="resolve('${h.id}',true)">W</button> <button class="btn-loss" onclick="resolve('${h.id}',false)">L</button></td></tr>`).join('');
           // RENDU ARCHIVE
            document.getElementById('arch-list').innerHTML = state.a.map(h=>`
                <tr>
                    <td>${h.t}</td>
                    <td>${h.isS ? '<b>'+h.n+' (P'+h.l+')</b>' : h.target}</td>
                    <td>${h.cote}</td>
                    <td>${h.m}€</td>
                    <td><span style="color:${h.win?'#22c55e':'#da0812'}; font-weight:800;">${h.win?'GAGNÉ':'PERDU'}</span></td>
                    <td style="text-align:right; font-weight:800;">${h.win ? (h.m*h.cote).toFixed(2)+'€' : '0€'}</td>
                </tr>`).join('');
            document.getElementById('u-mgr-list').innerHTML = state.u.map((u,i)=>`<tr><td><b>${u.n}</b></td><td style="color:#fbbf24;">${"⭐".repeat(u.s)}</td><td>P${u.l}</td><td style="text-align:right"><button onclick="delUnit(${i})" style="color:red; background:none; border:none; cursor:pointer;">SUPPR</button></td></tr>`).join('');
            document.getElementById('books-grid').innerHTML = Object.keys(state.b).map(k=>`<div class="stat-card"><label>${k.toUpperCase()}</label><input type="number" value="${state.b[k]}" onchange="state.b['${k}']=this.value;save()" style="background:transparent; border:none; text-align:center; font-size:18px; color:white; font-weight:900;"></div>`).join('');
            
            updMise();
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        }

        function updMise() {
            const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
            if(u) document.getElementById('c-mise').value = MISES[u.l-1];
        }

        function addUnit() {
            const name = document.getElementById('u-n-add').value;
            if(!name) return;
            state.u.push({n: name, s: parseInt(document.getElementById('u-s-add').value), l: 1});
            document.getElementById('u-n-add').value = "";
            save();
        }

        function delUnit(i) { if(confirm("Supprimer ?")) { state.u.splice(i,1); save(); } }

        function addBook() {
            const name = document.getElementById('new-bk-name').value.toLowerCase();
            if(!name) return;
            state.b[name] = 0;
            document.getElementById('new-bk-name').value = "";
            save();
        }

        function pari(isS) {
            let n, b, c, m, target = "", l = 1;
           const now = new Date();
const time = now.toLocaleDateString('fr-FR', {day: '2-digit', month: '2-digit'}) + ' ' + now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
            if (isS) {
                const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
                if (!u) return;
                n = u.n; b = document.getElementById('c-book').value; c = parseFloat(document.getElementById('c-cote').value); m = parseFloat(document.getElementById('c-mise').value); l = u.l;
            } else {
                target = document.getElementById('n-target').value; n = document.getElementById('n-desc').value; b = document.getElementById('n-book').value; c = parseFloat(document.getElementById('n-cote').value); m = parseFloat(document.getElementById('n-mise').value);
            }
            if (state.b[b] >= m && m > 0) {
                state.b[b] = (parseFloat(state.b[b]) - m).toFixed(2);
                state.h.unshift({ id: Date.now().toString(), n: n, target: target, b: b, l: l, m: m, cote: c, isS: isS, t: time });
                if (isS) { const u = state.u.find(x => x.n === n); if (u && u.l < 8) u.l++; }
                save();
            } else { alert("Solde insuffisant"); }
        }

        function resolve(id, win) {
    const hIdx = state.h.findIndex(x => x.id === id);
    if(hIdx === -1) return;
    const h = state.h[hIdx];
    h.win = win; 
    if(win) {
        state.b[h.b] = (parseFloat(state.b[h.b]) + (h.m * h.cote)).toFixed(2);
        if(h.isS) { const u = state.u.find(x => x.n == h.n); if(u) u.l = 1; }
    }
    // Bascule vers le tableau archive
    state.a.unshift(h);
    state.h.splice(hIdx, 1);
    save();
}

        function exportData() { document.getElementById('io-data').value = btoa(JSON.stringify(state)); }
        function importData() { 
            try { state = JSON.parse(atob(document.getElementById('io-data').value)); save(); } catch(e) { alert("Erreur"); }
        }

        window.onload = render;
    </script>
</body>
</html>
