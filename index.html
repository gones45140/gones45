

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - COMMAND CENTER</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
            --accent-cyan: #06b6d4; --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar PC */
        .sidebar { width: 16rem; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 1.5rem 1rem; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--ol-red); padding-bottom: 0.5rem; }

        /* Main Content */
        .main { flex-grow: 1; padding: 2rem; overflow-y: auto; background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }

        /* Grilles & Cards (Responsive %) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 1.2rem; text-align: center; backdrop-filter: blur(10px); }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--text); display: block; }

        .chart-box { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; min-height: 300px; }

        .nav-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; border-radius: 10px; color: #94a3b8; cursor: pointer; border: none; background: transparent; font-weight: 600; width: 100%; text-align: left; transition: 0.3s; }
        .nav-item.active { background: var(--ol-blue); color: #fff; }

        /* MOBILE : Nav en bas */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; flex-direction: row; padding: 0.2rem; border-right: none; border-top: 3px solid var(--ol-red); z-index: 1000; }
            .logo { display: none; }
            .nav-item { flex-direction: column; font-size: 0.6rem; gap: 0.2rem; flex: 1; justify-content: center; align-items: center; }
            .main { padding: 1rem; padding-bottom: 80px; }
            .chart-box { min-height: 250px; padding: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GONES45</div>
        <button class="nav-item active"><i class="fas fa-chart-line"></i><span>Mur de Lyon</span></button>
        <button class="nav-item"><i class="fas fa-wallet"></i><span>Bankroll</span></button>
        <button class="nav-item"><i class="fas fa-users"></i><span>Unités</span></button>
    </nav>

    <main class="main">
        <div class="stats-grid">
            <div class="stat-card">
                <span style="font-size: 0.7rem; color: var(--accent-cyan);">CAPITAL</span>
                <span class="stat-val">1250€</span>
            </div>
            <div class="stat-card">
                <span style="font-size: 0.7rem; color: var(--ol-red);">ROI %</span>
                <span class="stat-val">+12.5%</span>
            </div>
        </div>

        <div class="chart-box">
            <h4 style="font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 1rem; color: var(--ol-blue);">ÉVOLUTION GLOBALE</h4>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="chart-box">
            <h4 style="font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 1rem; color: var(--ol-red);">PERF PAR ÉQUIPE</h4>
            <canvas id="teamChart"></canvas>
        </div>
    </main>

    <script>
        // Graphique 1 : Courbe
        const ctx1 = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['1 Mai', '3 Mai', '5 Mai', '8 Mai', '10 Mai', '12 Mai'],
                datasets: [{
                    label: 'Capital',
                    data: [1000, 1050, 1030, 1150, 1120, 1250],
                    borderColor: '#0046a7',
                    fill: true,
                    backgroundColor: 'rgba(0, 70, 167, 0.2)',
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // Graphique 2 : Barres (Equipes)
        const ctx2 = document.getElementById('teamChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['Boca', 'PSV', 'Palmeiras', 'LAFC'],
                datasets: [{
                    data: [45, 80, 120, -20],
                    backgroundColor: ['#0046a7', '#da0812', '#0046a7', '#334155'],
                    borderRadius: 5
                }]
            },
            options: { 
                indexAxis: 'y',
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } } 
            }
        });

        // Activation des boutons
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });
    </script>
</body>
</html>
