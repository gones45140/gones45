

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - COMMAND CENTER V28.2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
            --accent-cyan: #06b6d4; --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR PC --- */
        .sidebar { width: 16rem; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 1.5rem 1rem; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--ol-red); padding-bottom: 0.5rem; color: #fff; }
        
        .nav-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.85rem 1rem; border-radius: 10px; color: #94a3b8; cursor: pointer; border: none; background: transparent; font-weight: 600; width: 100%; transition: 0.3s; margin-bottom: 0.3rem; }
        .nav-item i { width: 20px; text-align: center; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: var(--ol-blue); color: #fff; box-shadow: 0 4px 15px rgba(0, 70, 167, 0.4); }

        /* --- MAIN CONTENT --- */
        .main { flex-grow: 1; padding: 2rem; overflow-y: auto; background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); scroll-behavior: smooth; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 1.5rem; text-align: center; backdrop-filter: blur(10px); position: relative; overflow: hidden; }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; display: block; margin-top: 0.5rem; color: #fff; }

        /* Charts */
        .chart-box { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; height: 320px; }

        /* Forms & Tables */
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1rem; }
        input { background: var(--sidebar); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; flex: 1; min-width: 120px; font-family: 'Inter'; }
        .btn-add { background: var(--ol-red); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; font-family: 'Orbitron'; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.85rem; }
        th { text-align: left; padding: 12px; color: var(--accent-cyan); text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; flex-direction: row; padding: 0.5rem; border-right: none; border-top: 3px solid var(--ol-red); z-index: 1000; justify-content: space-around; }
            .logo { display: none; }
            .nav-item { flex-direction: column; font-size: 0.6rem; gap: 0.3rem; padding: 0.5rem; flex: 1; align-items: center; justify-content: center; margin-bottom: 0; }
            .nav-item i { font-size: 1.2rem; }
            .main { padding: 1rem; padding-bottom: 90px; }
            .chart-box { height: 260px; padding: 1rem; }
            .stat-val { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GONES<span>45</span></div>
        <button class="nav-item active" onclick="showSection('home')"><i class="fas fa-home"></i><span>Mur de Lyon</span></button>
        <button class="nav-item" onclick="showSection('cockpit')"><i class="fas fa-plane"></i><span>Cockpit</span></button>
        <button class="nav-item" onclick="showSection('bankroll')"><i class="fas fa-wallet"></i><span>Bankroll</span></button>
        <button class="nav-item" onclick="showSection('unites')"><i class="fas fa-users"></i><span>Unités</span></button>
    </nav>

    <main class="main">
        <div class="stats-grid">
            <div class="stat-card" style="border-top: 3px solid var(--ol-blue);">
                <span style="font-size: 0.7rem; color: var(--accent-cyan); font-weight: 800;">CAPITAL TOTAL</span>
                <span class="stat-val" id="totalCap">1 250.00€</span>
            </div>
            <div class="stat-card" style="border-top: 3px solid var(--ol-red);">
                <span style="font-size: 0.7rem; color: var(--ol-red); font-weight: 800;">BÉNÉFICES MOIS</span>
                <span class="stat-val" id="monthlyProfit">+215.40€</span>
            </div>
        </div>

        <div class="chart-box">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 1rem; color: var(--accent-cyan);">
                <i class="fas fa-chart-line"></i> ÉVOLUTION STRATÉGIQUE (GLOBAL)
            </h3>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="stat-card" style="text-align: left;">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; color: var(--ol-red);">NEW TICKET WINAMAX</h3>
            <div class="input-group">
                <input type="text" id="betTeam" placeholder="Équipe / Match">
                <input type="number" id="betOdds" placeholder="Cote (ex: 1.54)" step="0.01">
                <input type="number" id="betStake" placeholder="Mise (€)">
                <button class="btn-add" onclick="addNewBet()">PARIER</button>
            </div>
        </div>

        <div class="stat-card" style="margin-top: 1.5rem; padding: 0.5rem; text-align: left;">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; padding: 1rem; color: var(--accent-cyan);">DERNIERS MOUVEMENTS</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Match / Stratégie</th>
                            <th>Cote</th>
                            <th>Mise</th>
                            <th>État</th>
                        </tr>
                    </thead>
                    <tbody id="betList">
                        <tr>
                            <td>Boca Juniors & Under 3.5</td>
                            <td>1.54</td>
                            <td>50€</td>
                            <td style="color: #22c55e; font-weight: 800;">GAGNÉ</td>
                        </tr>
                        <tr>
                            <td>PSV & Over 1.5</td>
                            <td>1.62</td>
                            <td>30€</td>
                            <td style="color: #94a3b8;">EN ATTENTE</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="chart-box" style="margin-top: 1.5rem;">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 1rem; color: var(--ol-red);">RÉSULTATS PAR UNITÉ</h3>
            <canvas id="teamChart"></canvas>
        </div>
    </main>

    <script>
        // --- NAVIGATION ---
        function showSection(section) {
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            console.log("Section demandée : " + section);
        }

        // --- GRAPH 1 : ÉVOLUTION ---
        const ctx1 = document.getElementById('mainChart').getContext('2d');
        const grad1 = ctx1.createLinearGradient(0, 0, 0, 300);
        grad1.addColorStop(0, 'rgba(0, 70, 167, 0.4)');
        grad1.addColorStop(1, 'rgba(2, 6, 23, 0)');

        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['1 Mai', '3 Mai', '5 Mai', '8 Mai', '10 Mai', '12 Mai'],
                datasets: [{
                    data: [1000, 1050, 1030, 1150, 1120, 1250],
                    borderColor: '#0046a7',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: grad1,
                    tension: 0.4,
                    pointBackgroundColor: '#da0812'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } }
            }
        });

        // --- GRAPH 2 : ÉQUIPES ---
        const ctx2 = document.getElementById('teamChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['Boca', 'PSV', 'Palmeiras', 'LAFC'],
                datasets: [{
                    data: [45, 82, 110, -15],
                    backgroundColor: ['#0046a7', '#da0812', '#0046a7', '#334155'],
                    borderRadius: 5
                }]
            },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // --- LOGIQUE SAISIE ---
        function addNewBet() {
            const team = document.getElementById('betTeam').value;
            const odds = document.getElementById('betOdds').value;
            const stake = document.getElementById('betStake').value;
            
            if(team && odds && stake) {
                const table = document.getElementById('betList');
                const row = table.insertRow(0);
                row.innerHTML = `<td>${team}</td><td>${odds}</td><td>${stake}€</td><td style="color:#94a3b8">EN ATTENTE</td>`;
                alert("Pari enregistré dans le cockpit !");
            }
        }
    </script>
</body>
</html>
