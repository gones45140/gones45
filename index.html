<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gones Bankroll</title>

    <!-- Scripts externes pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    STAGE 2 : DESIGN (CSS) - OPTIMISATION MOBILE & DARK MODE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 
-->
<style>
    :root {
        --bg-dark: #0f172a;
        --panel-bg: rgba(30, 41, 59, 0.7);
        --accent-cyan: #22d3ee;
        --ol-blue: #1e40af;
        --ol-red: #da0812;
        --win-green: #22c55e;
        --text-main: #f8fafc;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-dark);
        color: var(--text-main);
        padding-bottom: 80px; /* Espace pour la nav mobile */
    }

    /* --- CONTENEURS ET GRILLES --- */
    .container { padding: 15px; max-width: 800px; margin: auto; }

    .glass-panel {
        background: var(--panel-bg);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
    }

    .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
    }

    /* --- ÉLÉMENTS DE FORMULAIRE --- */
    input, select, textarea {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: white;
        font-size: 16px; /* Évite le zoom auto sur iPhone */
    }

    .btn-main {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: none;
        font-weight: bold;
        background: var(--ol-blue);
        color: white;
        cursor: pointer;
        text-transform: uppercase;
    }

    .btn-win { background: #166534; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; }
    .btn-loss { background: #991b1b; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; }
    .btn-mini { background: #334155; color: #cbd5e1; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; }
    .btn-mini-red { background: #7f1d1d; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; }

    /* --- TABLES ET LISTES --- */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; font-size: 12px; color: #94a3b8; padding: 8px 5px; text-transform: uppercase; }
    td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

    /* --- NAVIGATION BASSE --- */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1e293b;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
        border-top: 1px solid #334155;
        z-index: 100;
    }

    .nav-item {
        color: #94a3b8;
        text-decoration: none;
        font-size: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: none;
        border: none;
    }

    .nav-item.active { color: var(--accent-cyan); }
    .nav-item i { font-size: 20px; margin-bottom: 4px; }

    /* --- MODALE --- */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 200;
        padding: 20px;
    }

    /* --- COMPOSANTS SPÉCIFIQUES --- */
    .mini-stat {
        background: rgba(0,0,0,0.3);
        padding: 5px;
        border-radius: 4px;
        font-size: 11px;
        text-align: center;
    }

    .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .bet-mode-switch {
        display: flex;
        gap: 5px;
        margin-bottom: 15px;
    }

    .bet-mode-btn {
        flex: 1;
        padding: 10px;
        background: #334155;
        border: none;
        color: white;
        border-radius: 6px;
        font-size: 12px;
    }

    .bet-mode-btn.active { background: var(--accent-cyan); color: var(--bg-dark); font-weight: bold; }
</style>
</head>
    <body>
        <!-- 
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    STAGE 1 : STRUCTURE (HTML)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 
-->
<div class="container">
    <!-- HEADER & CAPITAL -->
    <div class="header-bar">
        <div>
            <h1 style="margin:0; font-size: 24px; color: var(--accent-cyan);">GONES BANKROLL</h1>
            <small id="d-ben" style="font-weight: bold;"></small>
        </div>
        <div style="text-align: right;">
            <div id="d-cap" style="font-size: 22px; font-weight: bold;">0.00€</div>
            <small style="opacity: 0.6;">CAPITAL TOTAL</small>
        </div>
    </div>

    <!-- ONGLETS PRINCIPAUX -->
    <div id="tab-dashboard" class="tab-content">
        <!-- STATS RAPIDES -->
        <div class="stat-grid">
            <div class="glass-panel">
                <label style="font-size: 10px; opacity: 0.7;">PROFIT BOOSTS</label>
                <div id="stat-boost-profit" style="color: var(--accent-cyan); font-weight: bold;">0.00€</div>
            </div>
            <div class="glass-panel">
                <label style="font-size: 10px; opacity: 0.7;">WINRATE BOOSTS</label>
                <div id="stat-boost-rate" style="font-weight: bold;">0%</div>
            </div>
        </div>

        <!-- FORMULAIRE DE PARI -->
        <div class="glass-panel">
            <div class="bet-mode-switch">
                <button class="bet-mode-btn active" id="btn-mode-strat" onclick="switchBetMode('strat'); this.classList.add('active'); document.getElementById('btn-mode-simple').classList.remove('active')">STRATÉGIE</button>
                <button class="bet-mode-btn" id="btn-mode-simple" onclick="switchBetMode('simple'); this.classList.add('active'); document.getElementById('btn-mode-strat').classList.remove('active')">SIMPLE / BOOST</button>
            </div>

            <!-- MODE STRATÉGIE -->
            <div id="sub-strat">
                <select id="c-unit" onchange="updMise()"></select>
                <input type="text" id="c-target" placeholder="Match (ex: Boca vs Palmeiras)">
                <input type="text" id="c-type" placeholder="Type (ex: Qualification)">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="c-cote" step="0.01" placeholder="Cote (ex: 1.55)">
                    <input type="number" id="c-mise" placeholder="Mise (€)">
                </div>
                <select id="c-book"></select>
                <button class="btn-main" onclick="pari(true)" style="margin-top: 10px;">VALIDER STRAT</button>
            </div>

            <!-- MODE SIMPLE -->
            <div id="sub-simple" style="display:none;">
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="p-sport" placeholder="Sport" style="flex:1">
                    <input type="text" id="n-comp" placeholder="Compétition" style="flex:2">
                </div>
                <input type="text" id="n-type" placeholder="Type (ex: Score Exact ou Boost)">
                <textarea id="n-analysis" placeholder="Notes ou Analyse rapide..." rows="2"></textarea>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="n-cote" step="0.01" placeholder="Cote">
                    <input type="number" id="n-mise" placeholder="Mise (€)">
                </div>
                <select id="n-book"></select>
                <button class="btn-main" onclick="pari(false)" style="margin-top: 10px; background: var(--accent-cyan); color: var(--bg-dark);">VALIDER SIMPLE</button>
            </div>
        </div>

        <!-- PARIS EN COURS -->
        <h3 style="font-size: 14px; color: var(--accent-cyan); text-transform: uppercase;">🔥 Paris en cours</h3>
        <div class="glass-panel" style="padding: 0;">
            <table>
                <thead><tr><th>Détails</th><th>Mise</th><th style="text-align:right">Action</th></tr></thead>
                <tbody id="h-live-strat"></tbody>
                <tbody id="h-live-norm"></tbody>
            </table>
        </div>
    </div>

    <!-- PAGE ÉQUIPES (GÉRÉ PAR JS) -->
    <div id="tab-equipes" class="tab-content" style="display:none;">
        <div id="page-bilan-equipes"></div>
    </div>

    <!-- PAGE ARCHIVES -->
    <div id="tab-archives" class="tab-content" style="display:none;">
        <div class="glass-panel" style="padding:0;">
            <table style="font-size: 12px;">
                <thead><tr><th>Date</th><th>Pari</th><th>Mise</th><th>Rés.</th><th style="text-align:right">Gain</th></tr></thead>
                <tbody id="arch-finished-list"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="exportData()" style="background:#334155; margin-top:15px;">EXPORTER LES DONNÉES (JSON)</button>
    </div>

    <!-- PAGE PARAMÈTRES (BANQUES & UNITÉS) -->
    <div id="tab-settings" class="tab-content" style="display:none;">
        <div class="glass-panel">
            <h3>🏦 Gestion des Bookmakers</h3>
            <div id="books-grid"></div>
            <div style="display:flex; gap:5px; margin-top:15px;">
                <input type="text" id="new-bk-name" placeholder="Nom du bookmaker">
                <button onclick="addBook()" class="btn-main" style="width:auto;">+</button>
            </div>
        </div>

        <div class="glass-panel">
            <h3>📏 Mes Unités (Teams)</h3>
            <table id="u-mgr-list"></table>
            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px;">
                <input type="text" id="u-n-add" placeholder="Nom de l'unité (ex: OL)">
                <select id="u-s-add">
                    <option value="1">Strat 1 (Défensive)</option>
                    <option value="2">Strat 2 (Standard)</option>
                    <option value="3">Strat 3 (Agressive)</option>
                    <option value="4">Strat 4 (High Stake)</option>
                    <option value="5">Strat 5 (Whale)</option>
                </select>
                <button class="btn-main" onclick="addUnit()">AJOUTER L'ÉQUIPE</button>
            </div>
        </div>
    </div>
</div>

<!-- NAVIGATION BASSE -->
<div class="bottom-nav">
    <button class="nav-item active" onclick="showTab('tab-dashboard', this)"><i>🏠</i>Dashboard</button>
    <button class="nav-item" onclick="showTab('tab-equipes', this)"><i>📊</i>Équipes</button>
    <button class="nav-item" onclick="showTab('tab-archives', this)"><i>📜</i>Archives</button>
    <button class="nav-item" onclick="showTab('tab-settings', this)"><i>⚙️</i>Admin</button>
</div>

<!-- MODALE DÉTAILS ÉQUIPE -->
<div id="modal-details" class="modal">
    <div class="glass-panel" id="modal-content" style="max-width: 500px; margin: 20% auto;"></div>
</div>
        <!-- 
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    STAGE 3 : LOGIQUE (JAVASCRIPT) - VERSION OPTIMISÉE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 
-->
<script>
    // --- 1. INITIALISATION DU SYSTÈME ---
    let state = JSON.parse(localStorage.getItem('gones_state')) || {
        b: { "winamax": 0 }, 
        u: [], 
        h: [], 
        a: [], 
        start_bk: 0
    };

    const STRATS = {
        "1": [1, 2, 6, 18, 54, 162, 486, 1458],
        "2": [2, 4, 12, 36, 108, 324, 972, 2916],
        "3": [2, 4, 12, 36, 108, 324, 972, 2916],
        "4": [5, 10, 30, 90, 270, 810, 2430, 7290],
        "5": [10, 20, 60, 180, 540, 1620, 4860, 14580]
    };

    function save() {
        localStorage.setItem('gones_state', JSON.stringify(state));
        render();
    }

    // --- 2. CRÉATION D'UN PARI ---
    function pari(isS) {
        let n, b, c, m, target, type, l = 1, sport = "";
        const now = new Date();
        const time = now.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

        if (isS) {
            const uObj = state.u.find(x => x.n === document.getElementById('c-unit').value);
            if (!uObj) return alert("Crée une unité !");
            n = uObj.n; 
            target = document.getElementById('c-target').value || "-";
            type = document.getElementById('c-type')?.value || "-";
            b = document.getElementById('c-book').value;
            c = parseFloat(document.getElementById('c-cote').value) || 0;
            m = parseFloat(document.getElementById('c-mise').value) || 0;
            l = uObj.l;
        } else {
            n = "SIMPLE"; 
            sport = document.getElementById('p-sport').value;
            const analysis = document.getElementById('n-analysis').value;
            const comp = document.getElementById('n-comp').value;
            target = analysis || comp || "Pari Simple"; 
            type = document.getElementById('n-type').value || "-";
            b = document.getElementById('n-book').value;
            c = parseFloat(document.getElementById('n-cote').value.replace(',', '.')) || 0;
            m = parseFloat(document.getElementById('n-mise').value) || 0;
        }

        if (m > 0 && (parseFloat(state.b[b]) || 0) >= m) {
            state.b[b] = (parseFloat(state.b[b]) - m).toFixed(2);
            
            const newPari = { 
                id: Date.now().toString(), 
                n, target, b, l, m, cote: c, isS, t: time,
                sport: sport,
                type: type,
                comp: isS ? "STRATÉGIE" : (document.getElementById('n-comp')?.value || "SANS COMPÉ"),
                analysis: isS ? "" : (document.getElementById('n-analysis')?.value || "")
            };

            state.h.unshift(newPari);
            
            // Nettoyage des champs
            document.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(i => i.value = "");
            save();
            updMise();
        } else {
            alert("Solde insuffisant sur " + b + " !");
        }
    }

    // --- 3. VALIDATION DU RÉSULTAT ---
    function result(id, win) {
        const idx = state.h.findIndex(x => x.id === id);
        if (idx === -1) return;
        const bet = state.h[idx];

        const debrief = prompt(`Note de débrief (${win ? 'WIN ✅' : 'LOSS ❌'}) :`, "");

        if (win) {
            state.b[bet.b] = (parseFloat(state.b[bet.b]) + (bet.m * bet.cote)).toFixed(2);
            if (bet.isS) { 
                const u = state.u.find(x => x.n === bet.n); 
                if(u) u.l = 1; 
            }
        } else if (bet.isS) {
            const u = state.u.find(x => x.n === bet.n);
            if(u && u.l < 8) u.l++;
        }

        state.a.unshift({ 
            ...bet, 
            win, 
            debrief: debrief || "Aucun débrief",
            analysis: bet.analysis || "Aucune analyse" 
        });

        state.h.splice(idx, 1);
        save();
        updMise();
    }

    // --- 4. GESTION DE LA BANKROLL ---
    function handleFund(add) {
        const b = document.getElementById('move-book-select').value;
        const amt = parseFloat(document.getElementById('move-amount').value);
        if(!b || isNaN(amt)) return;
        state.b[b] = (parseFloat(state.b[b] || 0) + (add ? amt : -amt)).toFixed(2);
        if(add) state.start_bk += amt;
        save();
    }

    function addBook() {
        const name = document.getElementById('new-bk-name').value.trim().toLowerCase();
        if(name) {
            if (state.b[name] !== undefined) return alert("Existe déjà !");
            const initialAmount = parseFloat(prompt(`Solde de départ pour ${name.toUpperCase()} ?`, "0")) || 0;
            state.b[name] = initialAmount.toFixed(2);
            state.start_bk += initialAmount; 
            document.getElementById('new-bk-name').value = "";
            save();
        }
    }

    function editBook(n) {
        const current = parseFloat(state.b[n]);
        const promptValue = prompt(`Nouveau solde pour ${n.toUpperCase()} ?`, current);
        if (promptValue !== null) {
            const next = parseFloat(promptValue);
            if (!isNaN(next)) {
                state.start_bk += (next - current); 
                state.b[n] = next.toFixed(2);
                save();
            }
        }
    }

    // --- 5. UNITÉS ET MISES ---
    function addUnit() {
        const n = document.getElementById('u-n-add').value.trim().toUpperCase();
        if(n) { 
            state.u.push({ n, s: document.getElementById('u-s-add').value, l: 1 }); 
            save(); 
        }
    }

    function updMise() {
        const select = document.getElementById('c-unit');
        if (!select) return;
        const u = state.u.find(x => x.n === select.value);
        if (u) document.getElementById('c-mise').value = STRATS[u.s][u.l-1];
    }

    // --- 6. RENDU GLOBAL (RENDER) ---
    function render() {
        const total = Object.values(state.b).reduce((a, v) => a + parseFloat(v), 0);
        document.getElementById('d-cap').innerText = total.toFixed(2) + "€";
        const ben = total - state.start_bk;
        const benEl = document.getElementById('d-ben');
        benEl.innerText = (ben >= 0 ? "+" : "") + ben.toFixed(2) + "€";
        benEl.style.color = ben >= 0 ? "#22c55e" : "#da0812";

        // Selects
        const bOpt = Object.keys(state.b).map(k => `<option value="${k}">${k.toUpperCase()}</option>`).join('');
        ['c-book', 'n-book', 'move-book-select'].forEach(id => {
            if(document.getElementById(id)) document.getElementById(id).innerHTML = bOpt;
        });
        
        const uSelect = document.getElementById('c-unit');
        if (uSelect) uSelect.innerHTML = state.u.map(u => `<option value="${u.n}">${u.n} (P${u.l})</option>`).join('');

        // Paris Live Stratégie
        document.getElementById('h-live-strat').innerHTML = state.h.filter(x => x.isS).map(h => `
            <tr><td>${h.n}</td><td>${h.target}</td><td>${h.m}€</td>
            <td style="text-align:right"><button class="btn-win" onclick="result('${h.id}',true)">W</button> 
            <button class="btn-loss" onclick="result('${h.id}',false)">L</button></td></tr>`).join('');

        // Paris Live Simples
        document.getElementById('h-live-norm').innerHTML = state.h.filter(x => !x.isS).map(h => `
            <tr>
                <td style="padding: 10px 5px;">
                    <div style="font-size: 10px; color: var(--accent-cyan); text-transform: uppercase;">${h.comp}</div>
                    <div style="font-weight: bold;">${h.target}</div>
                    <div style="font-size: 11px; color: #94a3b8;">${h.type} @${h.cote}</div>
                </td>
                <td><div style="font-weight: bold; color: var(--accent-cyan);">${h.m}€</div></td>
                <td style="text-align: right;">
                    <button class="btn-win" onclick="result('${h.id}',true)">W</button> 
                    <button class="btn-loss" onclick="result('${h.id}',false)">L</button>
                </td>
            </tr>`).join('');

        // Archive (Top 10)
        document.getElementById('arch-finished-list').innerHTML = state.a.slice(0,10).map(h => `
            <tr>
                <td title="ANALYSE: ${h.analysis}\nDEBRIEF: ${h.debrief}">${h.t}<br><small style="color:var(--accent-cyan);">ℹ️ Notes</small></td>
                <td><b>${h.target}</b><br><small>${h.type}</small></td>
                <td>${h.m}€<br><small>@${h.cote}</small></td>
                <td style="color:${h.win ? '#22c55e' : '#da0812'}">${h.win ? 'WIN' : 'LOSS'}</td>
                <td style="text-align:right"><b>${h.win ? (h.m*h.cote).toFixed(2) : '0'}€</b></td>
            </tr>`).join('');

        // Books Grid
        document.getElementById('books-grid').innerHTML = Object.entries(state.b).map(([n, v]) => `
            <div class="stat-card" style="border-bottom: 4px solid var(--ol-blue);">
                <label>${n.toUpperCase()}</label>
                <div class="stat-val">${parseFloat(v).toFixed(2)}€</div>
                <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
                    <button onclick="editBook('${n}')" class="btn-mini">MODIFIER</button>
                    <button onclick="if(confirm('Supprimer ${n} ?')){delete state.b['${n}'];save();}" class="btn-mini-red">SUPPRIMER</button>
                </div>
            </div>`).join('');

        // Unités Manager
        document.getElementById('u-mgr-list').innerHTML = state.u.map((u, i) => `
            <tr><td><b>${u.n}</b></td><td>${"⭐".repeat(u.s)}</td><td>P${u.l}</td>
            <td><button onclick="state.u.splice(${i},1);save()" style="color:red;background:none;border:none;">X</button></td></tr>`).join('');

        // Dashboard Unités
        document.getElementById('dash-summary').innerHTML = state.u.map(u => `
            <tr><td>${u.n}</td><td>${"⭐".repeat(u.s)}</td><td>P${u.l}</td><td style="text-align:right; color:var(--accent-cyan)">ACTIF</td></tr>`).join('');

        // Stats Boosts
        const boosts = state.a.filter(h => h.type.toLowerCase().includes('boost'));
        const bProfit = boosts.reduce((acc, h) => acc + (h.win ? (h.m * h.cote) - h.m : -h.m), 0);
        document.getElementById('stat-boost-profit').innerText = (bProfit >= 0 ? "+" : "") + bProfit.toFixed(2) + "€";
        document.getElementById('stat-boost-rate').innerText = boosts.length > 0 ? (boosts.filter(h => h.win).length / boosts.length * 100).toFixed(0) + "%" : "0%";

        renderPageEquipes();
    }

    // --- 7. LOGIQUE PAGE ÉQUIPES ---
    function renderPageEquipes() {
        const page = document.getElementById('page-bilan-equipes');
        if (!page) return;

        if (state.u.length === 0) {
            page.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.5;">Aucune équipe configurée.</div>`;
            return;
        }

        page.innerHTML = `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px;">
            ${state.u.map(unite => {
                const paris = state.a.filter(h => h.n === unite.n);
                const profit = paris.reduce((acc, h) => acc + (h.win ? (h.m * h.cote) - h.m : -h.m), 0);
                const wr = paris.length > 0 ? (paris.filter(h => h.win).length / paris.length * 100).toFixed(0) : 0;
                
                return `
                    <div class="glass-panel" onclick="openDetails('${unite.n}')" style="cursor:pointer; border-left: 4px solid var(--ol-blue);">
                        <div style="display:flex; justify-content:space-between;">
                            <div>
                                <h3 style="margin:0;">${unite.n}</h3>
                                <span style="font-size:10px; opacity:0.6;">${paris.length} PARIS</span>
                            </div>
                            <div style="font-weight:bold; color:${profit >= 0 ? 'var(--win-green)' : 'var(--ol-red)'};">
                                ${profit >= 0 ? '+' : ''}${profit.toFixed(2)}€
                            </div>
                        </div>
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-top:15px;">
                            <div class="mini-stat">WR: ${wr}%</div>
                            <div class="mini-stat">P${unite.l}</div>
                            <div class="mini-stat" style="color:var(--accent-cyan)">DÉTAILS</div>
                        </div>
                    </div>`;
            }).join('')}
        </div>`;
    }

    // --- 8. MODALE ET GRAPHIQUES ---
    function openDetails(nom) {
        const modal = document.getElementById('modal-details');
        const content = document.getElementById('modal-content');
        const paris = state.a.filter(h => h.n === nom);
        
        modal.style.display = 'block';
        content.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>${nom}</h2>
                <button onclick="closeDetails()" style="background:none; border:none; color:white; font-size:30px;">&times;</button>
            </div>
            <div style="height:250px; margin-top:20px;">
                <canvas id="chart-mobile"></canvas>
            </div>
        `;
        
        if (paris.length > 0) renderMiniChart('chart-mobile', paris);
    }

    function renderMiniChart(canvasId, paris) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        let chartStatus = Chart.getChart(canvasId); 
        if (chartStatus != undefined) chartStatus.destroy();

        let current = 0;
        const pts = [0, ...paris.reverse().map(h => {
            current += (h.win ? (h.m * h.cote) - h.m : -h.m);
            return current.toFixed(2);
        })];

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: pts.map((_, i) => i),
                datasets: [{
                    data: pts,
                    borderColor: '#22d3ee',
                    backgroundColor: 'rgba(34, 211, 238, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function closeDetails() { document.getElementById('modal-details').style.display = 'none'; }

    // --- 9. NAVIGATION ET UTILITAIRES ---
    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        render();
    }

    function switchBetMode(mode) {
        const isStrat = mode === 'strat';
        document.getElementById('sub-strat').style.display = isStrat ? 'block' : 'none';
        document.getElementById('sub-simple').style.display = isStrat ? 'none' : 'block';
    }

    function exportData() {
        const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
        const a = document.createElement('a'); a.href = data; a.download = "bankroll_gones.json"; a.click();
    }

    window.onload = () => { render(); updMise(); };
</script>
        </body>
</html>
