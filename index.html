<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - Stratégie & Bankroll</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         STAGE 1 : DESIGN (CSS)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-cyan: #22d3ee;
            --ol-blue: #1e40af;
            --ol-red: #da0812;
            --text-main: #f8fafc;
            --win-green: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            padding-bottom: 80px; 
            background-attachment: fixed;
        }

        /* --- HEADER & NAVIGATION --- */
        .header {
            background: linear-gradient(135deg, var(--ol-blue), #000);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--ol-red);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-item {
            padding: 12px 5px;
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active { color: var(--accent-cyan); background: rgba(34, 211, 238, 0.1); }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 4px; }

        /* --- CONTAINERS --- */
        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-card label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 5px; }
        .stat-val { font-size: 18px; font-weight: 800; }

        /* --- FORMULAIRES --- */
        .form-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        label { font-size: 11px; color: var(--accent-cyan); font-weight: bold; }
        input, select {
            width: 100%; padding: 10px; margin-top: 5px; background: #0f172a;
            border: 1px solid #334155; color: white; border-radius: 6px; font-size: 14px;
        }
        .grid-tactical { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* --- BOUTONS --- */
        .btn-action {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background: var(--ol-blue); color: white; font-weight: 800;
            margin-top: 10px; cursor: pointer;
        }
        .btn-win { background: var(--win-green); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .btn-loss { background: var(--ol-red); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; }

        /* --- TABLES --- */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 12px; }
        th { text-align: left; color: #64748b; padding: 8px; border-bottom: 1px solid #334155; font-size: 10px; }
        td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <header class="header">
        <h1 style="font-size: 18px; letter-spacing: 2px;">GONES<span style="color:var(--ol-red)">45</span></h1>
    </header>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         STAGE 2 : STRUCTURE (HTML)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <main class="main">

        <!-- 1. DASHBOARD -->
        <div id="dash" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-blue);"><label>CAPITAL TOTAL</label><span id="d-cap" class="stat-val">0€</span></div>
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-red);"><label>BÉNÉFICE</label><span id="d-ben" class="stat-val">0€</span></div>
            </div>
            <div class="glass-panel">
                <table style="min-width: 100%;">
                    <thead><tr><th>UNITÉ</th><th>RANG</th><th>PALIER</th><th style="text-align:right">ÉTAT</th></tr></thead>
                    <tbody id="dash-summary"></tbody>
                </table>
            </div>
        </div>

        <!-- 2. ARCHIVE -->
        <div id="arch" class="tab-content">
            <h3 style="color:var(--accent-cyan); margin-bottom:10px; font-size:14px;">HISTORIQUE RÉCENT</h3>
            <div class="glass-panel">
                <table>
                    <thead><tr><th>DATE</th><th>CIBLE</th><th>MISE</th><th>RÉSULTAT</th><th style="text-align:right">GAIN</th></tr></thead>
                    <tbody id="arch-finished-list"></tbody>
                </table>
            </div>
            <button class="btn-action" style="background:var(--ol-red); font-size:11px;" onclick="if(confirm('Vider l\'archive ?')){state.a=[];save();}">EFFACER L'HISTORIQUE</button>
        </div>

        <!-- NOUVEL ONGLET UNIQUE : PARI SPORTIF (Cockpit + Simple) -->
<div id="p-betting-hub" class="tab-content active">
    
    <!-- Boutons de bascule interne -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btn-switch-strat" onclick="switchBetMode('strat')" style="flex:1; padding:12px; border-radius:8px; border:1px solid var(--ol-blue); background:var(--ol-blue); color:white; font-weight:bold; cursor:pointer;">
            🚀 COCKPIT
        </button>
        <button id="btn-switch-simple" onclick="switchBetMode('simple')" style="flex:1; padding:12px; border-radius:8px; border:1px solid #1e293b; background:none; color:#94a3b8; font-weight:bold; cursor:pointer;">
            🎯 PARI SIMPLE
        </button>
    </div>

    <!-- SOUS-ONGLET 1 : COCKPIT (Stratégie) -->
    <div id="sub-strat">
        <div class="form-box">
            <div class="grid-tactical">
                <div><label>Unité</label><select id="c-unit" onchange="updMise()"></select></div>
                <div><label>Adversaire</label><input id="c-target" placeholder="Ex: Boca Juniors..."></div>
                <div style="grid-column: span 2;"><label>Type de Pari</label><input id="c-type" placeholder="Ex: Victoire ou Qualif..."></div>
                <div><label>Bookmaker</label><select id="c-book"></select></div>
                <div><label>Cote</label><input type="number" id="c-cote" value="1.50" step="0.01"></div>
                <div style="grid-column: span 2;"><label>Mise (€)</label><input type="number" id="c-mise" style="border: 1px solid var(--win-green);"></div>
            </div>
            <button class="btn-action" onclick="pari(true)">ENGAGER LA MONTANTE</button>
        </div>
        <div class="glass-panel">
            <table id="table-strat">
                <thead><tr><th>UNITÉ</th><th>CIBLE</th><th>MISE</th><th style="text-align:right">ACTION</th></tr></thead>
                <tbody id="h-live-strat"></tbody>
            </table>
        </div>
    </div>

    <!-- SOUS-ONGLET 2 : PARI SIMPLE -->
    <div id="sub-simple" style="display:none;">
        <div class="form-box">
            <div class="grid-tactical">
                <div><label>Sport</label><select id="p-sport"><option value="⚽">⚽ Football</option><option value="🏀">🏀 Basket</option><option value="🎾">🎾 Tennis</option></select></div>
                <div><label>Date</label><input type="date" id="p-match-date"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; grid-column: span 2;">
                    <div><label>Compétition</label><input id="n-comp" placeholder="Ex: Ligue 1, Copa Lib..."></div>
                    <div><label>Type de pari</label><input id="n-type" placeholder="Ex: Over 1.5, Qualif..."></div>
                </div>
                <div style="grid-column: span 2;">
                    <label>Intitulé / Analyse Avant-Match</label>
                    <textarea id="n-analysis" placeholder="Ex: Boca qualif + Under 3.5..." style="width:100%; height:60px; background:var(--bg-card); border:1px solid #1e293b; color:white; border-radius:8px; padding:10px; font-family:inherit;"></textarea>
                </div>
                <div><label>Cote</label><input type="number" id="n-cote" value="1.50"></div>
                <div><label>Mise</label><input type="number" id="n-mise" value="10"></div>
                <div style="grid-column: span 2;"><label>Bookmaker</label><select id="n-book"></select></div>
            </div>
            <button class="btn-action" onclick="pari(false)">PLACER LE PARI SIMPLE</button>
        </div>
        <div class="glass-panel">
            <table>
                <thead><tr><th>CIBLE</th><th>MISE</th><th style="text-align:right">ACTION</th></tr></thead>
                <tbody id="h-live-norm"></tbody>
            </table>
        </div>
    </div>
</div>

        <!-- 5. BANKROLL & SETUP -->
        <div id="bank-mgr" class="tab-content">
            <div class="form-box">
                <label>DÉPÔT / RETRAIT</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr 100px; gap:10px; margin-top:5px;">
                    <select id="move-book-select"></select> 
                    <input type="number" id="move-amount" placeholder="Montant €">
                    <div style="display:flex; gap:5px;">
                        <button class="btn-win" onclick="handleFund(true)">+</button>
                        <button class="btn-loss" onclick="handleFund(false)">-</button>
                    </div>
                </div>
            </div>

            <div class="form-box">
                <label>CRÉER UN BOOKMAKER</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <input id="new-bk-name" placeholder="Nom...">
                    <button class="btn-action" style="width:100px; margin:0;" onclick="addBook()">OK</button>
                </div>
            </div>

            <div id="books-grid" class="stats-grid"></div>

            <div class="form-box" style="margin-top:20px;">
                <label>UNITÉS DE MISE (STRATÉGIE)</label>
                <div style="display:grid; grid-template-columns: 1fr 80px 80px; gap:10px; margin:10px 0;">
                    <input id="u-n-add" placeholder="Nom (Ex: FOOT)">
                    <select id="u-s-add">
                        <option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option>
                    </select>
                    <button class="btn-action" style="margin:0" onclick="addUnit()">ADD</button>
                </div>
                <div class="glass-panel" style="background:rgba(0,0,0,0.4)">
                    <table><tbody id="u-mgr-list"></tbody></table>
                </div>
            </div>

            <div class="form-box" style="border: 1px dashed #334155;">
                <label>DONNÉES & BACKUP</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <button class="btn-action" onclick="exportData()" style="background:#0ea5e9;">EXPORTER</button>
                    <button class="btn-action" onclick="importData()" style="background:#64748b;">IMPORTER</button>
                </div>
                <button class="btn-action" style="background:#334155; margin-top:10px;" onclick="state.start_bk = parseFloat(prompt('Nouveau capital de départ ?')); save();">RESET CAPITAL DÉPART</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab('dash', this)"><i class="fa-solid fa-chart-pie"></i>MUR</div>
        <div class="nav-item active" onclick="showTab('p-betting-hub', this)">PARI SPORTIF</div>
        <div class="nav-item" onclick="showTab('arch', this)"><i class="fa-solid fa-clock-rotate-left"></i>ARCHIVE</div>
        <div class="nav-item" onclick="showTab('bank-mgr', this)"><i class="fa-solid fa-wallet"></i>BANK</div>
    </nav>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         STAGE 3 : LOGIQUE (JAVASCRIPT)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <script>
        let state = JSON.parse(localStorage.getItem('gones_state')) || {
            b: { "winamax": 0 }, u: [], h: [], a: [], start_bk: 0
        };

        const STRATS = {
            "1": [1, 2, 6, 18, 54, 162, 486, 1458],
            "2": [2, 4, 12, 36, 108, 324, 972, 2916],
            "3": [2, 4, 12, 36, 108, 324, 972, 2916], // Basé sur tes préférences
            "4": [5, 10, 30, 90, 270, 810, 2430, 7290],
            "5": [10, 20, 60, 180, 540, 1620, 4860, 14580]
        };

        function save() {
            localStorage.setItem('gones_state', JSON.stringify(state));
            render();
        }

       function pari(isS) {
    let n, b, c, m, target, type, l = 1, sport = "";
    const now = new Date();
    const time = now.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

    // Récupération des nouveaux champs (pour les deux modes)
    const competition = document.getElementById('n-comp') ? document.getElementById('n-comp').value : "-";
    const analysis = document.getElementById('n-analysis') ? document.getElementById('n-analysis').value : "";

    if (isS) {
        const uObj = state.u.find(x => x.n === document.getElementById('c-unit').value);
        if (!uObj) return alert("Crée une unité !");
        n = uObj.n; 
        target = document.getElementById('c-target').value || "-";
        type = document.getElementById('c-type') ? document.getElementById('c-type').value : "-";
        b = document.getElementById('c-book').value;
        c = parseFloat(document.getElementById('c-cote').value) || 0;
        m = parseFloat(document.getElementById('c-mise').value) || 0;
        l = uObj.l;
    } else {
        n = "SIMPLE"; 
        sport = document.getElementById('p-sport').value;
        target = document.getElementById('n-target').value || "Pari";
        type = document.getElementById('n-type') ? document.getElementById('n-type').value : "-";
        b = document.getElementById('n-book').value;
        c = parseFloat(document.getElementById('n-cote').value) || 0;
        m = parseFloat(document.getElementById('n-mise').value) || 0;
    }

    if (m > 0 && (state.b[b] || 0) >= m) {
        state.b[b] = (parseFloat(state.b[b]) - m).toFixed(2);
        
        // On enregistre toutes les infos dans l'objet
        state.h.unshift({ 
            id: Date.now().toString(), 
            n, target, b, l, m, cote: c, isS, t: time,
            comp: competition,
            type: type,
            analysis: analysis,
            sport: sport
        });
        
        save();
        
        // Nettoyage des champs
        if (isS) {
            document.getElementById('c-target').value = "";
        } else {
            document.getElementById('n-target').value = "";
            if(document.getElementById('n-comp')) document.getElementById('n-comp').value = "";
            if(document.getElementById('n-type')) document.getElementById('n-type').value = "";
            if(document.getElementById('n-analysis')) document.getElementById('n-analysis').value = "";
        }
    } else {
        alert("Solde insuffisant !");
    }
}

        function result(id, win) {
    const idx = state.h.findIndex(x => x.id === id);
    if (idx === -1) return;
    const bet = state.h[idx];

    // 1. Demande de débrief à la validation (Optionnel : clic sur Annuler = Pas de note)
    const debrief = prompt(`Note de débrief (${win ? 'WIN ✅' : 'LOSS ❌'}) :`, "");

    // 2. Logique de paiement et de paliers (Ta logique actuelle)
    if (win) {
        state.b[bet.b] = (parseFloat(state.b[bet.b]) + (bet.m * bet.cote)).toFixed(2);
        // Si c'est un pari stratégique, on reset l'unité au palier 1
        if (bet.isS) { 
            const u = state.u.find(x => x.n === bet.n); 
            if(u) u.l = 1; 
        }
    } else if (bet.isS) {
        // Si c'est une perte en stratégie, on monte de palier (max P8)
        const u = state.u.find(x => x.n === bet.n);
        if(u && u.l < 8) u.l++;
    }

    // 3. Archivage avec tes nouvelles données (Analyse + Débrief)
    state.a.unshift({ 
        ...bet, 
        win, 
        debrief: debrief || "Aucun débrief",
        // L'analyse doit avoir été saisie lors de la création du pari
        analysis: bet.analysis || "Aucune analyse" 
    });

    // 4. Nettoyage et sauvegarde
   state.h.splice(idx, 1);
    save();
    updMise();
    render(); // Pour rafraîchir l'affichage direct
}

        function handleFund(add) {
            const b = document.getElementById('move-book-select').value;
            const amt = parseFloat(document.getElementById('move-amount').value);
            if(!b || isNaN(amt)) return;
            state.b[b] = (parseFloat(state.b[b] || 0) + (add ? amt : -amt)).toFixed(2);
            if(add) state.start_bk += amt;
            save();
        }

        function updMise() {
            const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
            if (u) document.getElementById('c-mise').value = STRATS[u.s][u.l-1];
        }

        function addBook() {
    const nameInput = document.getElementById('new-bk-name');
    const name = nameInput.value.trim().toLowerCase();
    
    if(name) {
        if (state.b[name] !== undefined) return alert("Existe déjà !");
        
        // Demande le solde initial à la création
        const initialAmount = parseFloat(prompt(`Solde de départ pour ${name.toUpperCase()} ?`, "0")) || 0;
        
        state.b[name] = initialAmount.toFixed(2);
        // On ajuste le capital de départ pour que le bénéfice reste à 0 au début
        state.start_bk += initialAmount; 
        
        nameInput.value = "";
        save();
    }
}

function editBook(n) {
    const current = parseFloat(state.b[n]);
    const next = parseFloat(prompt(`Nouveau solde pour ${n.toUpperCase()} ?`, current));
    
    if (!isNaN(next)) {
        const diff = next - current;
        state.b[n] = next.toFixed(2);
        // Important : on ajuste aussi le capital de départ pour refléter ce changement "manuel"
        state.start_bk += diff; 
        save();
    }
}

        function addUnit() {
            const n = document.getElementById('u-n-add').value.trim().toUpperCase();
            if(n) { state.u.push({ n, s: document.getElementById('u-s-add').value, l: 1 }); save(); }
        }

        function render() {
    // 1. Calculs des totaux (Capital et Bénéfice)
    const total = Object.values(state.b).reduce((a, v) => a + parseFloat(v), 0);
    document.getElementById('d-cap').innerText = total.toFixed(2) + "€";
    const ben = total - state.start_bk;
    document.getElementById('d-ben').innerText = (ben >= 0 ? "+" : "") + ben.toFixed(2) + "€";
    document.getElementById('d-ben').style.color = ben >= 0 ? "#22c55e" : "#da0812";

    // 2. Mise à jour des listes déroulantes (Books et Unités)
    const bOpt = Object.keys(state.b).map(k => `<option value="${k}">${k.toUpperCase()}</option>`).join('');
    ['c-book', 'n-book', 'move-book-select'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = bOpt;
    });
    
    const uSelect = document.getElementById('c-unit');
    if (uSelect) {
        uSelect.innerHTML = state.u.map(u => `<option value="${u.n}">${u.n} (P${u.l})</option>`).join('');
    }

    // 3. Affichage des paris en cours (Stratégie)
    document.getElementById('h-live-strat').innerHTML = state.h.filter(x => x.isS).map(h => `
        <tr><td>${h.n}</td><td>${h.target}</td><td>${h.m}€</td>
        <td style="text-align:right"><button class="btn-win" onclick="result('${h.id}',true)">W</button> 
        <button class="btn-loss" onclick="result('${h.id}',false)">L</button></td></tr>`).join('');

    
 //4. Affichage des paris en cours (Simples) avec Compétition et Type
document.getElementById('h-live-norm').innerHTML = state.h.filter(x => !x.isS).map(h => `
    <tr>
        <td style="padding: 10px 5px;">
            <div style="font-size: 10px; color: var(--accent-cyan); text-transform: uppercase;">${h.comp || 'SANS COMPÉ'}</div>
            <div style="font-weight: bold;">${h.target}</div>
            <div style="font-size: 11px; color: #94a3b8;">${h.type || '-'} @${h.cote}</div>
        </td>
        <td style="vertical-align: middle;">
            <div style="font-weight: bold; color: var(--accent-cyan);">${h.m}€</div>
            <div style="font-size: 9px; opacity: 0.7;">${h.b.toUpperCase()}</div>
        </td>
        <td style="text-align: right; vertical-align: middle;">
            <button class="btn-win" onclick="result('${h.id}',true)" style="padding: 5px 10px; margin-right: 5px;">W</button> 
            <button class="btn-loss" onclick="result('${h.id}',false)" style="padding: 5px 10px;">L</button>
        </td>
    </tr>`).join('');

    // 5. Historique (Archive)
   document.getElementById('arch-finished-list').innerHTML = state.a.slice(0,10).map(h => `
    <tr>
        <td title="ANALYSE: ${h.analysis}\nDEBRIEF: ${h.debrief}">
            ${h.t}<br>
            <small style="color:var(--accent-cyan); cursor:help;">ℹ️ Détails notes</small>
        </td>
        <td><b>${h.target}</b><br><small>${h.type || ''}</small></td>
        <td>${h.m}€<br><small>@${h.cote}</small></td>
        <td style="color:${h.win ? '#22c55e' : '#da0812'}">${h.win ? 'WIN' : 'LOSS'}</td>
        <td style="text-align:right"><b>${h.win ? (h.m*h.cote).toFixed(2) : '0'}€</b></td>
    </tr>`).join('');

    // 6. GRILLE DES BOOKS (Avec le nouveau bouton MODIFIER)
    document.getElementById('books-grid').innerHTML = Object.entries(state.b).map(([n, v]) => `
        <div class="stat-card" style="border-bottom: 4px solid var(--ol-blue);">
            <label>${n.toUpperCase()}</label>
            <div class="stat-val">${parseFloat(v).toFixed(2)}€</div>
            <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
                <button onclick="editBook('${n}')" style="background:none; border:1px solid var(--accent-cyan); color:var(--accent-cyan); font-size:9px; padding:2px 5px; border-radius:4px; cursor:pointer;">MODIFIER</button>
                <button onclick="if(confirm('Supprimer ${n} ?')){delete state.b['${n}'];save();}" style="background:none; border:none; color:var(--ol-red); font-size:9px; cursor:pointer;">SUPPRIMER</button>
            </div>
        </div>`).join('');

    // 7. Gestion des Unités
    document.getElementById('u-mgr-list').innerHTML = state.u.map((u, i) => `
        <tr><td><b>${u.n}</b></td><td>${"⭐".repeat(u.s)}</td><td>P${u.l}</td>
        <td><button onclick="state.u.splice(${i},1);save()" style="background:none;border:none;color:red;">X</button></td></tr>`).join('');
    
    // 8. Résumé Dashboard
    document.getElementById('dash-summary').innerHTML = state.u.map(u => `
        <tr><td>${u.n}</td><td>${"⭐".repeat(u.s)}</td><td>P${u.l}</td><td style="text-align:right; color:var(--accent-cyan)">ACTIF</td></tr>`).join('');
}
       
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function exportData() {
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const a = document.createElement('a'); a.href = data; a.download = "gones45_backup.json"; a.click();
        }

        function importData() {
            const i = document.createElement('input'); i.type = 'file';
            i.onchange = e => {
                const r = new FileReader(); r.onload = ev => { state = JSON.parse(ev.target.result); save(); location.reload(); };
                r.readAsText(e.target.files[0]);
            }; i.click();
        }

        window.onload = () => { render(); updMise(); };
       function switchBetMode(mode) {
    const isStrat = mode === 'strat';
    document.getElementById('sub-strat').style.display = isStrat ? 'block' : 'none';
    document.getElementById('sub-simple').style.display = isStrat ? 'none' : 'block';
    
    const btnStrat = document.getElementById('btn-switch-strat');
    const btnSimple = document.getElementById('btn-switch-simple');
    
    if(isStrat) {
        btnStrat.style.background = 'var(--ol-blue)'; btnStrat.style.color = 'white';
        btnSimple.style.background = 'none'; btnSimple.style.color = '#94a3b8';
    } else {
        btnSimple.style.background = 'var(--ol-blue)'; btnSimple.style.color = 'white';
        btnStrat.style.background = 'none'; btnStrat.style.color = '#94a3b8';
    }
} 
    </script>
</body>
</html>
