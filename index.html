<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GONES45 - V28.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.8);
            --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
            --accent-cyan: #06b6d4; --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; margin-bottom: 30px; text-align: center; border-bottom: 2px solid var(--ol-red); padding-bottom: 10px; }
        
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; color: #94a3b8; cursor: pointer; border: none; background: transparent; font-size: 13px; font-weight: 600; margin-bottom: 5px; text-align: left; width: 100%; }
        .nav-item.active { background: var(--ol-blue); color: #fff; }

        .main { flex-grow: 1; padding: 25px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* RECTIFICATION DU DESIGN ÉCRASÉ */
        .form-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .grid-inputs { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            margin-bottom: 20px; 
            align-items: flex-end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
        
        /* Correction Couleur Label (Blanc pour être lisible) */
        .input-group label { font-size: 11px; font-weight: 900; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { background: #1e293b; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-weight: 600; }
        
        .btn-launch { 
            background: linear-gradient(90deg, var(--ol-blue), var(--ol-red)); 
            color: white; border: none; padding: 15px; border-radius: 10px; 
            font-family: 'Orbitron', sans-serif; font-weight: 900; width: 100%; 
            cursor: pointer; text-transform: uppercase;
        }

        .glass-panel { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0, 70, 167, 0.6); padding: 15px; text-align: left; font-size: 11px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 3px solid var(--ol-red); }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">GONES<span>45</span></div>
    <button class="nav-item active" onclick="showTab('dash', this)"><i class="fa-solid fa-chart-line"></i> Mur de Lyon</button>
    <button class="nav-item" onclick="showTab('cock', this)"><i class="fa-solid fa-crosshairs"></i> Cockpit Strat</button>
    <button class="nav-item" onclick="showTab('bank', this)"><i class="fa-solid fa-vault"></i> Bankroll</button>
</nav>

<main class="main">
    <div id="dash" class="tab-content active">
        <h2 style="margin-bottom:20px; font-family:'Orbitron';">TABLEAU DE BORD</h2>
        <div class="form-box" id="summary-data">Chargement...</div>
    </div>

    <div id="cock" class="tab-content">
        <div class="form-box">
            <div class="grid-inputs">
                <div class="input-group"><label>Unité</label><select id="u-sel"></select></div>
                <div class="input-group"><label>Vecteur</label><select id="b-sel"></select></div>
                <div class="input-group"><label>Cote</label><input type="number" id="cote" value="2.00" step="0.01"></div>
                <div class="input-group"><label>Mise (€)</label><input type="number" id="mise" value="10"></div>
            </div>
            <button class="btn-launch" onclick="lancer()">Lancer Mission Stratégique</button>
        </div>
        <div class="glass-panel">
            <table>
                <thead><tr><th>HEURE</th><th>UNITÉ</th><th>PHASE</th><th>MISE</th><th>ACTION</th></tr></thead>
                <tbody id="live-list"></tbody>
            </table>
        </div>
    </div>

    <div id="bank" class="tab-content">
        <div class="form-box">
            <h3>LOGISTIQUE BANKROLL</h3>
            <div id="bk-display" style="margin-top:15px;"></div>
        </div>
    </div>
</main>

<script>
    let storageKey = 'g45_final_v28';
    let db = JSON.parse(localStorage.getItem(storageKey)) || {
        u: [{n:'REAL', l:1}], b: {WINAMAX: 1000}, h: []
    };

    function save() { localStorage.setItem(storageKey, JSON.stringify(db)); render(); }

    function render() {
        document.getElementById('u-sel').innerHTML = db.u.map(u=>`<option>${u.n} (P${u.l})</option>`).join('');
        document.getElementById('b-sel').innerHTML = Object.keys(db.b).map(b=>`<option>${b}</option>`).join('');
        
        document.getElementById('live-list').innerHTML = db.h.map((h,i)=>`
            <tr>
                <td>${h.t}</td>
                <td><b>${h.n}</b></td>
                <td>P${h.l}</td>
                <td>${h.m}€</td>
                <td><button onclick="resolve(${i},true)" style="color:#22c55e; background:none; border:none; cursor:pointer; font-weight:bold;">GAGNÉ</button></td>
            </tr>`).join('');

        const total = Object.values(db.b).reduce((a,b)=>a+b,0);
        document.getElementById('summary-data').innerHTML = `CAPITAL TOTAL : <b>${total}€</b>`;
        document.getElementById('bk-display').innerHTML = Object.keys(db.b).map(k=>`<div>${k} : ${db.b[k]}€</div>`).join('');
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function lancer() {
        const uName = document.getElementById('u-sel').value.split(' ')[0];
        const u = db.u.find(x=>x.n == uName);
        const b = document.getElementById('b-sel').value;
        const m = parseFloat(document.getElementById('mise').value);
        
        if(db.b[b] >= m) {
            db.b[b] -= m;
            db.h.push({
                n:u.n, b:b, m:m, l:u.l, 
                c:document.getElementById('cote').value,
                t:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
            });
            u.l++; save();
        } else { alert("Fonds insuffisants !"); }
    }

    function resolve(i, win) {
        const h = db.h[i]; const u = db.u.find(x=>x.n==h.n);
        if(win) { db.b[h.b] += (h.m * h.c); u.l = 1; }
        db.h.splice(i, 1); save();
    }

    window.onload = render;
</script>
</body>
</html>
