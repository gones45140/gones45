<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GONES45 - COMMAND CENTER V28.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --ol-blue: #0046a7; --ol-red: #da0812; --text: #ffffff;
            --accent-cyan: #06b6d4; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Navigation */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 3px solid var(--ol-red); padding: 20px 10px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 30px; text-align: center; border-bottom: 2px solid var(--ol-red); padding-bottom: 10px; }
        .nav-label { font-size: 10px; color: var(--ol-blue); letter-spacing: 2px; margin: 15px 0 5px 10px; font-weight: 800; text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; color: #94a3b8; cursor: pointer; border: none; background: transparent; width: 100%; font-size: 12px; font-weight: 600; transition: 0.3s; margin-bottom: 3px; text-align: left;}
        .nav-item.active { background: var(--ol-blue); color: #fff; box-shadow: 0 4px 12px rgba(0, 70, 167, 0.3); }

        /* Main Content */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; background-image: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 20px; text-align: center; backdrop-filter: blur(10px); }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; display: block; margin-top: 5px; color: #fff; }
        .glass-panel { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0, 70, 167, 0.5); text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .form-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 25px; }
        .grid-tactical { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; font-weight: 600; }
        
        .btn-action { background: linear-gradient(90deg, var(--ol-blue), var(--ol-red)); color: #fff; border: none; padding: 15px; border-radius: 10px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-win { background: #22c55e; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-weight: 800; cursor: pointer; }
        .btn-loss { background: var(--ol-red); color: white; border: none; padding: 6px 12px; border-radius: 5px; font-weight: 800; cursor: pointer; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; flex-direction: row; padding: 5px; border-right: none; border-top: 3px solid var(--ol-red); z-index: 1000; justify-content: space-around; overflow: hidden; }
            .logo, .nav-label { display: none; }
            .nav-item { flex-direction: column; font-size: 9px; gap: 5px; padding: 8px; flex: 1; align-items: center; justify-content: center; }
            .nav-item i { font-size: 16px; }
            .main { padding: 15px; padding-bottom: 85px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-val { font-size: 18px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GONES<span>45</span></div>
        <div class="nav-label">COMMAND CENTER</div>
        <button class="nav-item active" onclick="showTab('dash', this)"><i class="fa-solid fa-house"></i> Mur</button>
        <button class="nav-item" onclick="showTab('cock', this)"><i class="fa-solid fa-jet-fighter-up"></i> Cockpit</button>
        <button class="nav-item" onclick="showTab('p-norm', this)"><i class="fa-solid fa-ticket"></i> Pari</button>
        
        <div class="nav-label">LOGISTIQUE</div>
        <button class="nav-item" onclick="showTab('bank-mgr', this)"><i class="fa-solid fa-vault"></i> Bankroll</button>
        <button class="nav-item" onclick="showTab('units-mgr', this)"><i class="fa-solid fa-users-gear"></i> Unités</button>
    </nav>

    <main class="main">
        <div id="dash" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-blue);"><label>CAPITAL</label><span id="d-cap" class="stat-val">0€</span></div>
                <div class="stat-card" style="border-bottom: 4px solid var(--ol-red);"><label>BÉNÉFICE</label><span id="d-ben" class="stat-val">0€</span></div>
            </div>
            <div class="glass-panel">
                <table><thead><tr><th>UNITÉ</th><th>PALIER</th><th style="text-align:right">ÉTAT</th></tr></thead><tbody id="dash-summary"></tbody></table>
            </div>
        </div>

        <div id="cock" class="tab-content">
            <div class="form-box">
                <div class="grid-tactical">
                    <div class="input-box"><label>Unité</label><select id="c-unit" onchange="updMise()"></select></div>
                    <div class="input-box"><label>Vecteur</label><select id="c-book"></select></div>
                    <div class="input-box"><label>Cote</label><input type="number" id="c-cote" value="2.00" step="0.01"></div>
                    <div class="input-box"><label>Mise (€)</label><input type="number" id="c-mise" style="border:2px solid white;"></div>
                </div>
                <button class="btn-action" onclick="pari(true)">DÉPLOYER STRATÉGIE</button>
            </div>
            <div class="glass-panel">
                <table><tbody id="h-live-strat"></tbody></table>
            </div>
        </div>

        <div id="p-norm" class="tab-content">
            <div class="form-box">
                <div class="grid-tactical">
                    <input id="n-target" placeholder="Cible (Equipe)">
                    <input id="n-desc" placeholder="Mission (Type de pari)">
                    <select id="n-book"></select>
                    <input type="number" id="n-cote" placeholder="Cote">
                    <input type="number" id="n-mise" placeholder="Mise">
                </div>
                <button class="btn-action" style="background:#334155" onclick="pari(false)">ENGAGER PARI SIMPLE</button>
            </div>
            <div class="glass-panel">
                <table><tbody id="h-live-norm"></tbody></table>
            </div>
        </div>

        <div id="bank-mgr" class="tab-content">
            <div class="form-box">
                <label>Ajouter un Vecteur (Bookmaker)</label>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input id="new-bk-name" placeholder="Nom du bookmaker">
                    <button class="btn-action" style="width:120px;" onclick="addBook()">CRÉER</button>
                </div>
            </div>
            <div id="books-grid" class="stats-grid"></div>
            <div class="form-box">
                <textarea id="io-data" rows="3" style="font-family:monospace; font-size:10px;" placeholder="Code de sauvegarde..."></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px;">
                    <button class="btn-action" style="background:#334155" onclick="exportData()">SAUVEGARDER</button>
                    <button class="btn-action" style="background:var(--ol-blue)" onclick="importData()">CHARGER</button>
                </div>
            </div>
        </div>

        <div id="units-mgr" class="tab-content">
            <div class="form-box">
                <div class="grid-tactical">
                    <input id="u-n-add" placeholder="Nom de l'unité">
                    <select id="u-s-add"><option value="3">⭐⭐⭐</option><option value="5">⭐⭐⭐⭐⭐</option></select>
                    <button class="btn-action" onclick="addUnit()">ENRÔLER</button>
                </div>
            </div>
            <div class="glass-panel"><table id="u-mgr-list"></table></div>
        </div>
    </main>

    <script>
        const MISES = [10, 20, 60, 180, 540, 1620, 4860, 14580]; 
        let state = JSON.parse(localStorage.getItem('gones_v28')) || {
            u: [], h: [], a: [], b: { winamax: 10000 }, start_bk: 10000
        };

        function save() { localStorage.setItem('gones_v28', JSON.stringify(state)); render(); }

        function render() {
            const total = Object.values(state.b).reduce((a,v)=>a+parseFloat(v||0),0);
            document.getElementById('d-cap').innerText = total.toFixed(2)+"€";
            document.getElementById('d-ben').innerText = (total - state.start_bk).toFixed(2)+"€";

            const bOpt = Object.keys(state.b).map(k=>`<option value="${k}">${k.toUpperCase()}</option>`).join('');
            document.getElementById('c-unit').innerHTML = state.u.map(u=>`<option value="${u.n}">${u.n} (P${u.l})</option>`).join('');
            document.getElementById('c-book').innerHTML = bOpt;
            document.getElementById('n-book').innerHTML = bOpt;

            document.getElementById('h-live-strat').innerHTML = state.h.filter(h=>h.isS).map(h=>`<tr><td><b>${h.n}</b></td><td>P${h.l}</td><td>${h.m}€</td><td style="text-align:right"><button class="btn-win" onclick="resolve('${h.id}',true)">W</button> <button class="btn-loss" onclick="resolve('${h.id}',false)">L</button></td></tr>`).join('');
            document.getElementById('h-live-norm').innerHTML = state.h.filter(h=>!h.isS).map(h=>`<tr><td>${h.target}</td><td>${h.m}€</td><td style="text-align:right"><button class="btn-win" onclick="resolve('${h.id}',true)">W</button> <button class="btn-loss" onclick="resolve('${h.id}',false)">L</button></td></tr>`).join('');
            
            document.getElementById('dash-summary').innerHTML = state.u.map(u=>`<tr><td><b>${u.n}</b></td><td>PALIER ${u.l}</td><td style="text-align:right">ACTIF</td></tr>`).join('');
            document.getElementById('u-mgr-list').innerHTML = state.u.map((u,i)=>`<tr><td><b>${u.n}</b></td><td>${"⭐".repeat(u.s)}</td><td style="text-align:right"><button onclick="delUnit(${i})" style="color:red; background:none; border:none; cursor:pointer;">SUPPR</button></td></tr>`).join('');
            
            document.getElementById('books-grid').innerHTML = Object.keys(state.b).map(k=>`<div class="stat-card"><label>${k.toUpperCase()}</label><input type="number" value="${state.b[k]}" onchange="state.b['${k}']=this.value;save()" style="background:transparent; border:none; text-align:center; font-size:18px; color:white"></div>`).join('');
            updMise();
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        }

        function updMise() {
            const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
            if(u) document.getElementById('c-mise').value = MISES[u.l-1];
        }

        function addUnit() {
            const name = document.getElementById('u-n-add').value;
            if(!name) return;
            state.u.push({n: name, s: document.getElementById('u-s-add').value, l: 1});
            save();
        }

        function delUnit(i) { state.u.splice(i,1); save(); }

        function addBook() {
            const name = document.getElementById('new-bk-name').value.toLowerCase();
            if(!name) return;
            state.b[name] = 0;
            save();
        }

        function pari(isS) {
            let n, b, c, m, target = "", l = 1;
            if (isS) {
                const u = state.u.find(x => x.n === document.getElementById('c-unit').value);
                if (!u) return; n = u.n; b = document.getElementById('c-book').value; c = parseFloat(document.getElementById('c-cote').value); m = parseFloat(document.getElementById('c-mise').value); l = u.l;
            } else {
                target = document.getElementById('n-target').value; n = document.getElementById('n-desc').value; b = document.getElementById('n-book').value; c = parseFloat(document.getElementById('n-cote').value); m = parseFloat(document.getElementById('n-mise').value);
            }
            if (state.b[b] >= m) {
                state.b[b] = (parseFloat(state.b[b]) - m).toFixed(2);
                state.h.unshift({ id: Date.now(), n: n, target: target, b: b, l: l, m: m, cote: c, isS: isS });
                if (isS) { const u = state.u.find(x => x.n === n); if (u && u.l < 8) u.l++; }
                save();
            }
        }

        function resolve(id, win) {
            const h = state.h.find(x=>x.id == id);
            if(win) {
                state.b[h.b] = (parseFloat(state.b[h.b]) + (h.m * h.cote)).toFixed(2);
                if(h.isS) { const u=state.u.find(x=>x.n==h.n); if(u) u.l=1; }
            }
            state.h = state.h.filter(x=>x.id != id);
            save();
        }

        function exportData() { document.getElementById('io-data').value = btoa(JSON.stringify(state)); }
        function importData() { state=JSON.parse(atob(document.getElementById('io-data').value)); save(); location.reload(); }

        window.onload = render;
    </script>
</body>
</html>
